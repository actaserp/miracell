# MIRACELL
server.port=8042

# MIRACELL
server.servlet.session.cookie.name=miracell_jsessionid

# MIRACELL
spring.datasource.hikari.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.jdbc-url=${MIRACELL_DB_URL}


spring.datasource.hikari.username=${MIRACELL_DB_USERNAME}
spring.datasource.hikari.password=${MIRACELL_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maxLifetime = 1800000
spring.datasource.hikari.idle-timeout = 600000
spring.datasource.hikari.leak-detection-threshold=60000

