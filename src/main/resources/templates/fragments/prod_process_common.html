            /* ── 폼 초기화 ── */
            resetForm() {
                this.$form[0].reset();
                this.jobres = null;
                this.setButtonState();
            }

            /* ── 탭 전환 ── */
            initTabs() {
                const _this = this;
                // 기존 prod_result_lot과 동일: tab-links / tab-item 구조
                const $links = $('.tab-wrap .tab-links a');
                const $items = $('.tab-wrap .tab-item');

                $links.on('click', function (e) {
                    e.preventDefault();
                    const targetId = $(this).attr('href'); // '#tabBasic'
                    // ★ 활성 탭을 body 속성에 기록 (차수 탭 스티키 숨김 등 CSS 훅)
                    document.body.setAttribute('data-active-tab', ($(this).attr('name') || targetId.replace('#', '')));

                    // 링크 활성 표시
                    $links.parent('li').removeClass('active');
                    $(this).parent('li').addClass('active');

                    // 탭 콘텐츠 토글
                    $items.hide();
                    $(targetId).show();

                    // 탭 안 그리드 높이 재계산 (숨김→표시 시 wijmo가 0높이로 잡히는 문제 방지)
                    setTimeout(() => {
                        [_this.consumedGrid, _this.inputLotGrid, _this.chasuGrid, _this.defectGrid, _this.grid]
                            .forEach(g => { if (g) { try { g.invalidate(true); } catch (e) {} } });
                    }, 0);
                });

                // 첫번째 탭 활성 — touch-mode면 목록, 아니면 기본정보
                $items.hide();
                const isTouch = $('body').hasClass('touch-mode');
                const $firstLink = isTouch
                    ? $links.filter('[name="tabList"]')
                    : $links.filter('[name="tabBasic"]');

                $links.parent('li').removeClass('active');
                $firstLink.parent('li').addClass('active');
                $($firstLink.attr('href')).show();
                document.body.setAttribute('data-active-tab', ($firstLink.attr('name') || 'tabBasic'));
            }

            /* ── 이벤트 바인딩 ── */
            bindEvents() {
                const _this = this;
                $('#btnMainSearch').on('click',     () => _this.searchMainData());
                $('#btnWorkStart').on('click',      () => _this.workStart());
                $('#btnWorkFinish').on('click',     () => _this.workFinish());
                $('#btnWorkStop').on('click',       () => _this.workStop());
                $('#btnFinishCancel').on('click',   () => _this.workFinishCancel());
                $('#btnSave').on('click',           () => _this.saveBasicInfo());
                $('#btnDel').on('click',            () => _this.deleteJobRes());
                $('#btnDefectSave').on('click',     () => _this.saveDefectList());
                // 차수
                $('#btnAddChasu').on('click',       () => _this.addChasu());
                $('#btnDeleteChasu').on('click',    () => _this.deleteChasu());
                $('#btnSaveChasu').on('click',      () => _this.saveChasu());
                // 투입
                $('#btnConsumedSave').on('click',   () => _this.saveConsumedList());
                $('#btnInputLotList').on('click',   () => _this.showInputLotList());
                $('#btnInputLotSelect').on('click', () => _this.addMaterialLot());
                $('#btnLotSelectDel').on('click',   () => _this.delMaterialLot());
                // 로트 바코드 스캔
                $('#txtInputLot').on('keydown', function(e) {
                    if (e.key === 'Enter' || e.keyCode === 13) {
                        const lot_number = $(this).val();
                        const jr_pk = $('#jr_id').val();
                        _this.showLotInput(lot_number, jr_pk);
                    }
                });
                $('#btnInputLotSave').on('click', () => {
                    const lot_number = $('#txtInputLot').val();
                    const jr_pk = $('#jr_id').val();
                    _this.showLotInput(lot_number, jr_pk);
                });
                // 검색 엔터
                $('#ItemSearch').on('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); _this.searchMainData(); }
                });

                $('#input_lot_div').hide();
                // ★ 투입로트 보기/감추기
                $('#btnToggle').on('change', function() {
                    $('#input_lot_div').toggle(300);
                });

                // ★ 품목코드 필터 (디바운스)
                (function() {
                    let timer = null;
                    $('#txtInputCode').on('input', function() {
                        clearTimeout(timer);
                        timer = setTimeout(() => _this.showInputLotList(), 200);
                    });
                })();

                // 날짜 기본값
                const now = new Date();
                const oneYearAgo = new Date(now);
                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                const oneMonthLater = new Date(now);
                oneMonthLater.setMonth(oneMonthLater.getMonth() + 1);
                const fmt = d => d.toISOString().slice(0, 10);
                $('#date_from').val(fmt(oneYearAgo));
                $('#date_to').val(fmt(oneMonthLater));
            }

            /* ── 저장 ── */
            saveBasicInfo() {
                const _this = this;
                const data = FormUtil.extractForm(this.$form);
                data.workcenter_id = $('#workcenter_id').val();
                data.id = $('#jr_id').val();
                data.equipment_id = $('#equipment_id').val();
                data.manager_id = $('#manager_id').val();

                AjaxUtil.postAsyncData(this.baseUrl + '/save', data, (res) => {
                    if (res?.success) {
                        Notify.success('저장되었습니다.');
                        _this.searchMainData();
                        _this.showBasicInfo(res.data?.jr_pk || data.id);
                    }
                });
            }

            /* ── 삭제 ── */
            deleteJobRes() {
                const _this = this;
                const id = $('#jr_id').val();
                const order_num = $('#order_num').val();
                const equipment_id = $('#equipment_id').val();
                if (!id) { Alert.alert('', '삭제할 작업을 선택해주세요.'); return; }

                Alert.confirm('', '삭제하시겠습니까?', () => {
                    AjaxUtil.postAsyncData(_this.baseUrl + '/del', { id, order_num, equipment_id }, (res) => {
                        if (res?.success) {
                            Notify.success(res.message || '삭제되었습니다.');
                            _this.searchMainData();
                            _this.resetForm();
                        } else {
                            Alert.alert('삭제 실패', res?.message || '');
                        }
                    });
                });
            }

            /* ── 투입내역 저장 ── */
            saveConsumedList() {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                const mp_pk = $('#mp_id').val();
                const prodDate = $('#prod_date').val();
                const gridData = this.consumedGrid?.collectionView?.sourceCollection || [];
                if (gridData.length === 0) { Alert.alert('', '투입 품목이 없습니다.'); return; }

                const consumedList = gridData.map(item => ({
                    mat_pk: item.mat_pk || '',
                    bom_consumed: item.bom_consumed || '',
                    consumed_qty: item.consumed_qty || '',
                    consumed_start: item.consumed_start || '',
                    consumed_end: item.consumed_end || ''
                }));

                AjaxUtil.postAsyncData(this.baseUrl + '/consumed_save', {
                    jr_pk, mp_pk, prod_date: prodDate, bom_output_amount: '',
                    Q: JSON.stringify(consumedList)
                }, (res) => {
                    if (res?.success) {
                        Notify.success('저장되었습니다.');
                        _this.showConsumedList(jr_pk);
                    }
                });
            }

            /* ── 차수 수량변경 저장 ── */
            saveChasu() {
                const _this = this;
                const items = this.chasuGrid?.collectionView?.items || [];
                if (items.length === 0) { Alert.alert('', '차수를 추가해주세요.'); return; }
                const jr_pk = $('#jr_id').val();

                const chasuList = items.map(it => ({
                    jr_pk,
                    mp_id: it.id,
                    good_qty: parseFloat(it.good_qty) || 0,
                    defect_qty: parseFloat(it.defect_qty) || 0
                }));

                AjaxUtil.postAsyncData(this.baseUrl + '/chasu_save', JSON.stringify(chasuList), (res) => {
                    if (res?.success) {
                        Notify.success('차수 수량이 저장되었습니다.');
                        _this.showChasuList(jr_pk);
                        _this.showBasicInfo(jr_pk);
                    } else {
                        Alert.alert('저장 실패', res?.message || '');
                    }
                }, 'application/json');
            }

            /* ── 투입 로트 추가 (팝업) ── */
            addMaterialLot() {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                if (!jr_pk) { Alert.alert('', '작업을 선택해주세요.'); return; }

                const poppage = new PopupConsumMatLotPage();
                poppage.show(jr_pk, function(lot) {
                    if (!lot || lot.length === 0) return;
                    if (lot.length === 1) {
                        // 단일 로트 투입
                        $('#txtInputLot').val(lot[0].lot_number);
                        _this.showLotInput(lot[0].lot_number, jr_pk);
                    } else {
                        // 다중 로트 투입
                        AjaxUtil.postAsyncData(_this.baseUrl + '/multi_add_lot_input', {
                            jr_pk, mp_pk: $('#mp_id').val(), Q: JSON.stringify(lot)
                        }, (res) => {
                            if (res?.success) {
                                Notify.success('저장되었습니다');
                                _this.showInputLotList(jr_pk);
                                _this.showConsumedList(jr_pk);
                                $('#txtInputLot').val('');
                            } else {
                                Alert.alert('', res?.message || '로트 추가 실패');
                            }
                        });
                    }
                });
            }

            /* ── 투입 로트 삭제 ── */
            delMaterialLot() {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                if (!this.inputLotGrid) return;
                const sel = this.inputLotGrid.selectedItems;
                if (!sel || sel.length === 0) { Alert.alert('', '삭제할 로트를 선택해주세요.'); return; }
                const mpiPk = sel[0].mpi_id || sel[0].id;

                Alert.confirm('', '선택한 로트를 삭제하시겠습니까?', () => {
                    AjaxUtil.postAsyncData(_this.baseUrl + '/del_lot_list', { mpi_pk: mpiPk }, (res) => {
                        _this.showInputLotList(jr_pk);
                        _this.showConsumedList(jr_pk);
                    });
                });
            }

            /* ── 바코드 스캔 로트 투입 ── */
            async showLotInput(lot_number, jr_pk) {
                if (!lot_number) return;
                const _this = this;
                const state = $('#state').val();
                if (state === 'ordered') { Alert.alert('LOT 투입오류', '작업이 시작되지 않았습니다.'); return; }

                // 중복 저장 방지
                if (this._savingLot) return;
                this._savingLot = true;

                try {
                    // LOT 정보 조회
                    const res = await new Promise((resolve, reject) => {
                        AjaxUtil.postAsyncData('/api/popup/pop_prod_input/lot_info', {
                            action: 'lot_info', lot_number, jr_pk
                        }, (r) => r?.success ? resolve(r) : reject(new Error(r?.message || 'LOT 조회 실패')));
                    });

                    const lot = res.data || {};
                    if (res.message) Alert.alert('', res.message);
                    if (!lot.id) throw new Error('LOT 검색에 실패했습니다.');

                    const remain = parseFloat(lot.remain_input_qty ?? 0) || 0;
                    const autoQty = parseFloat(lot.cur_stock) || 0;
                    if (remain <= 0) { Alert.alert('', '잔여 투입수량이 없습니다.'); return; }

                    // 자동투입 조건 충족 시 바로 저장
                    if (autoQty > 0 && autoQty <= remain) {
                        this._saveLotInput(lot.id, autoQty, lot.mpi_id);
                        return;
                    }

                    // 조건 불충족 시 팝업
                    const poppage = new PopupLotInputPage();
                    poppage.show(lot_number, (sel) => {
                        if (!sel.lot_id) { Alert.alert('', 'LOT 검색에 실패했습니다.'); return; }
                        _this._saveLotInput(sel.lot_id, sel.input_qty, sel.mpi_id);
                    }, jr_pk);
                } catch (err) {
                    Alert.alert('', err.message || 'LOT 정보를 불러오지 못했습니다.');
                } finally {
                    this._savingLot = false;
                }
            }

            _saveLotInput(lot_id, input_qty, mpi_id) {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                const mp_pk = $('#mp_id').val();
                AjaxUtil.postAsyncData(this.baseUrl + '/add_lot_input', {
                    jr_pk, mp_pk, lot_id, input_qty, mpi_id
                }, (res) => {
                    if (res?.success) {
                        Notify.success('저장되었습니다');
                        _this.showInputLotList(jr_pk);
                        _this.showConsumedList(jr_pk);
                        $('#txtInputLot').val('');
                    } else {
                        Alert.alert('', res?.message || '');
                    }
                });
            }

            /* ── 부적합 저장 ── */
            saveDefectList() {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                const items = this.defectGrid?.collectionView?.items || [];
                if (items.length === 0) { Alert.alert('', '부적합 내역이 없습니다.'); return; }

                const defectList = items.filter(it => it.defect_qty > 0).map(it => ({
                    defect_id: it.defect_id,
                    defect_qty: it.defect_qty,
                    defect_remark: it.description || ''
                }));

                const data = {
                    jr_pk,
                    spjangcd: this.spjangcd || '',
                    defect_list: JSON.stringify(defectList)
                };

                AjaxUtil.postAsyncData(this.baseUrl + '/defect_save', data, (res) => {
                    if (res?.success) {
                        Notify.success('부적합 내역이 저장되었습니다.');
                        _this.showDefectList(jr_pk);
                        _this.showBasicInfo(jr_pk);
                    } else {
                        Alert.alert('저장 실패', res?.message || '');
                    }
                });
            }

            /* ── 생산화면 전용: 화면 크기 반응형 헤더·메뉴 접기 ── */
            initLayoutCollapse() {
                $('#layoutToggleBtn').remove();
                const hasParent = window.parent && window.parent !== window;
                const pwin = hasParent ? window.parent : null;
                // 부모 LayoutState는 있으면 사용(태블릿 접기), 없어도 자기화면 반응형은 동작
                let hasLS = false;
                try { hasLS = !!(pwin && pwin.LayoutState); } catch (e) { hasLS = false; }

                // 부모 메뉴 접기는 LayoutState에 위임 (없으면 no-op)
                const setParentLayout = (v) => { try { if (hasLS) pwin.LayoutState.set(v); } catch (e) {} };
                const getParentLayout = () => { try { return hasLS ? pwin.LayoutState.get() : false; } catch (e) { return false; } };

                // ── 뷰 모드 선택 버튼 (PC / 태블릿 / 모바일) — ☰(메뉴접기)와 별도 ──
                let $viewBar = $();
                let $btn = $();
                {
                    $viewBar = $(
                        '<span id="viewModeBar" style="display:inline-flex; gap:4px; margin-left:8px; vertical-align:middle;">' +
                        '<button type="button" data-view="pc"     title="PC 보기">PC</button>' +
                        '<button type="button" data-view="tablet" title="태블릿 보기">태블릿</button>' +
                        // '<button type="button" data-view="mobile" title="모바일 보기">모바일</button>' +
                        '</span>'
                    );
                    $viewBar.find('button').css({
                        height: '32px', minWidth: '52px', padding: '0 10px',
                        fontSize: '13px', border: '1px solid #cfd8dc',
                        background: '#fff', color: '#555', cursor: 'pointer',
                        borderRadius: '6px'
                    });
                    const $anchor = $('.page-title-wrap .left .bookmark.toggle');
                    if ($anchor.length) $anchor.after($viewBar);
                    else { $viewBar.css({ position:'fixed', top:'6px', left:'6px', zIndex:99999 }); $viewBar.appendTo('body'); }
                    $btn = $viewBar;
                }

                let collapsed = false;
                let mobile = false;
                let userToggledHere = false;

                const activateTab = (name) => {
                    $('.tab-wrap .tab-item').hide();
                    $('#' + (name === 'tabList' ? 'tabList' : 'tabBasic')).show();
                    $('.tab-links li').removeClass('active');
                    $('.tab-links a[name="' + name + '"]').parent('li').addClass('active');
                    document.body.setAttribute('data-active-tab', name);
                };

                // ★ 자기화면 + 부모(LayoutState) 동기화
                const sync = () => {
                    // (1) 부모 메뉴 접기: 태블릿/모바일이면 접기
                    setParentLayout(collapsed || mobile);

                    // (2) 자기화면 클래스
                    $('body').toggleClass('touch-mode', collapsed && !mobile);
                    $('body').toggleClass('mobile-mode', mobile);

                    // (3) 그리드/목록 전환
                    this.moveListToTab(collapsed && !mobile);
                    this.applyTouchGridSize(collapsed || mobile);
                    this.applyTouchGridColumns(collapsed && !mobile);
                    this.applyChasuGridColumns(collapsed && !mobile);   // ★ 차수 그리드 태블릿 컬럼
                    // ★ 투입·부적합·투입로트 그리드 태블릿 컬럼
                    const _tc = collapsed && !mobile;
                    this.applyTouchColumns(this.consumedGrid, {
                        star: 'mat_name',
                        widths: { mat_code:110, request_qty_sum:120, bom_consumed:130,
                            remain_input_qty:96, mc_qty:134, currentStock:100, unit:72 }
                    }, _tc);
                    this.applyTouchColumns(this.defectGrid, {
                        star: 'defect_type',
                        widths: { defect_qty:110 }
                    }, _tc);
                    this.applyTouchColumns(this.inputLotGrid, {
                        star: 'mat_name',
                        widths: { lot_number:150, mat_code:120, input_qty:100 }
                    }, _tc);

                    // (4) 시작/완료 → 하단 sticky 이동/복귀
                    this.moveStartFinishToSticky(collapsed || mobile);

                    if (mobile) {
                        this.renderMobileCards(this._lastData || []);
                        activateTab('tabBasic');
                    } else if (collapsed) {
                        activateTab('tabList');
                    } else {
                        activateTab('tabBasic');
                    }

                    if (typeof markActiveView === 'function') markActiveView();
                };

                function markActiveView() {
                    const cur = mobile ? 'mobile' : (collapsed ? 'tablet' : 'pc');
                    $viewBar.find('button').each(function () {
                        const on = $(this).attr('data-view') === cur;
                        $(this).css({
                            background: on ? '#1976d2' : '#fff',
                            color: on ? '#fff' : '#555',
                            borderColor: on ? '#1976d2' : '#cfd8dc',
                            fontWeight: on ? '600' : '400'
                        });
                    });
                }

                // 뷰 버튼 클릭 → 모드 강제 (이후 자동감지 정지)
                $viewBar.find('button').on('click', function () {
                    userToggledHere = true;
                    const v = $(this).attr('data-view');
                    if (v === 'pc')          { collapsed = false; mobile = false; }
                    else if (v === 'tablet') { collapsed = true;  mobile = false; }
                    else if (v === 'mobile') { collapsed = true;  mobile = true;  }
                    sync();
                    markActiveView();
                });

                // 폭 판정
                const getWidth = () => { try { return (pwin && pwin.innerWidth) || window.innerWidth; } catch (e) { return window.innerWidth; } };
                const isTouch = window.matchMedia('(pointer: coarse)').matches;
                const COLLAPSE_AT = 1600, EXPAND_AT = 1750;
                const MOBILE_ON = 600, MOBILE_OFF = 760;

                const apply = () => {
                    if (userToggledHere) return;
                    const w = getWidth();
                    const selfW = window.innerWidth;
                    let changed = false;

                    const wasMobile = mobile;
                    if (selfW <= MOBILE_ON)       mobile = true;
                    else if (selfW >= MOBILE_OFF) mobile = false;
                    if (wasMobile !== mobile) changed = true;

                    if (isTouch || w <= COLLAPSE_AT) { if (!collapsed) { collapsed = true; changed = true; } }
                    else if (w >= EXPAND_AT)         { if (collapsed)  { collapsed = false; changed = true; } }

                    if (changed) sync();
                };

                let rzTimer = null;
                const onResize = () => { clearTimeout(rzTimer); rzTimer = setTimeout(apply, 150); };

                apply();
                setTimeout(apply, 0);
                setTimeout(apply, 300);
                $(window).on('load', apply);
                window.addEventListener('resize', onResize);
                try { if (pwin) pwin.addEventListener('resize', onResize); } catch (e) {}

                // 떠날 때: 부모 펼침 복원 + 버튼/스티키 제거
                this._restoreLayout = () => {
                    try { setParentLayout(false); } catch (e) {}
                    if ($btn && $btn.length) $btn.remove();
                    try { this.moveStartFinishToSticky(false); } catch (e) {}
                    $('#stickyActionBar').remove();
                };
                window.addEventListener('unload', this._restoreLayout);
            }

            /* ── 시작/완료 버튼을 하단 sticky 바로 이동 ↔ 원위치 복귀 ──
               원본 버튼을 그대로 이동(복제X)하므로 ID 기반 클릭 이벤트 유지됨 */
            moveStartFinishToSticky(toSticky) {
                let $bar = $('#stickyActionBar');
                if (!$bar.length) {
                    // 폼 영역(.layout-contents) 끝에 sticky 바 생성
                    $('body').append('<div id="stickyActionBar"></div>');
                    $bar = $('#stickyActionBar');
                }
                const $start  = $('#btnWorkStart');
                const $finish = $('#btnWorkFinish');

                if (toSticky) {
                    // 원위치 기억(처음 한 번)
                    if (!this._startHome && $start.length) {
                        this._startHome  = $start.parent();   // 원래 들어있던 <li>
                        this._finishHome = $finish.parent();
                    }
                    // ★ 완료 라벨 → '작지 마감' (차수 단위 시작/완료와 구분, 작지 전체 마감 의미 명확화)
                    if ($finish.length && this._finishLabel == null) {
                        this._finishLabel = $finish.text();
                    }
                    if ($finish.length) $finish.text('작지 마감');
                    // sticky 바로 이동 (시작 → 완료 순)
                    if ($start.length)  $bar.append($start);
                    if ($finish.length) $bar.append($finish);
                } else {
                    // ★ 라벨 원복
                    if ($finish.length && this._finishLabel != null) $finish.text(this._finishLabel);
                    // 원위치 복귀
                    if (this._startHome && this._startHome.length)  this._startHome.append($start);
                    if (this._finishHome && this._finishHome.length) this._finishHome.append($finish);
                }
            }

            /* ── 목록(검색영역+그리드)을 탭 안↔원위치로 이동 ── */
            moveListToTab(intoTab) {
                const $tabList = $('#tabList');
                if (!$tabList.length) return;

                // 그리드가 어디 있든 찾기 (원위치 or 탭 안)
                const $gridBox = $('#proc-main-grid').closest('.container-fluid');
                const $searchTop = $gridBox.length
                    ? ($gridBox.parent().find('> .section-top').length
                        ? $gridBox.parent().find('> .section-top')
                        : $('#tabList > .section-top'))
                    : $();

                if (!$gridBox.length) return;

                if (intoTab) {
                    if ($gridBox.parent().is($tabList)) return;   // 이미 탭 안
                    // 원위치 기억
                    $gridBox.data('origin-parent', $gridBox.parent());
                    $searchTop.data('origin-parent', $searchTop.parent());
                    // 검색영역 먼저, 그리드 다음 순서로 탭에 삽입
                    $tabList.append($searchTop).append($gridBox);
                } else {
                    if (!$gridBox.parent().is($tabList)) return;  // 이미 원위치
                    const $go = $gridBox.data('origin-parent');
                    const $so = $searchTop.data('origin-parent');
                    if ($so && $so.length) $so.prepend($searchTop);
                    if ($go && $go.length) $go.append($gridBox);
                }
                setTimeout(() => this.grid?.invalidate(), 50);
            }

            /* ── 그리드 행 높이 확대/복원 ── */
            applyTouchGridSize(big) {
                [this.grid, this.chasuGrid, this.defectGrid, this.consumedGrid, this.inputLotGrid]
                    .forEach(g => {
                        if (!g) return;
                        g.rows.defaultSize = big ? 40 : 28;
                        g.columnHeaders.rows.defaultSize = big ? 40 : 30;
                        g.invalidate();
                    });
            }

            /* ── 태블릿/모바일: 메인 그리드 컬럼 간소화 ──
               재선언 없이 기존 grid.columns의 visible 토글로 제어.
               좁은 화면에선 핵심 컬럼만, 넓으면 전체 복원. */
            applyTouchGridColumns(simplify) {
                if (!this.grid || !this.grid.columns) return;
                // 좁은 화면에서 남길 핵심 컬럼
                const keep = ['order_num', 'mat_name', 'job_state', 'order_qty', 'good_qty'];
                this.grid.columns.forEach(col => {
                    if (!col.binding) return;   // 액션 컬럼 등은 건드리지 않음
                    col.visible = simplify ? keep.includes(col.binding) : true;
                });
                this.grid.invalidate();
            }

            /* ── 태블릿/키오스크: 차수 그리드 컬럼 조정 ──
               좁은 화면에선 시작/종료 시각 숨김 + 작업자 가변폭(*) + 작업컬럼 확대(버튼 터치영역).
               PC면 원래 폭/표시로 복원. (CSS로는 wijmo 컬럼폭을 못 바꿔 JS로 처리) */
            applyChasuGridColumns(touch) {
                const g = this.chasuGrid;
                if (!g || !g.columns) return;
                const by = b => g.columns.find(c => c.binding === b);
                const ch  = by('chasu');
                const wn  = by('worker_name');
                const stn = by('state_name');
                const iq  = by('input_qty');
                const gq  = by('good_qty');
                const dq  = by('defect_qty');
                const stt = by('start_time');
                const ett = by('end_time');
                const act = g.columns.find(c => c.header === '작업');

                if (touch) {
                    // 헤더/셀 글자 안 잘리게 핵심 컬럼 폭 확대
                    if (ch)  ch.width  = 66;          // '차수'
                    if (stn) stn.width = 80;          // '진행중' 등
                    if (iq)  iq.width  = 78;          // '배정량'
                    if (gq)  gq.width  = 78;          // '양품량'
                    if (dq)  dq.width  = 78;          // '부적합'
                    if (stt) stt.visible = false;     // 시작 시각 숨김
                    if (ett) ett.visible = false;     // 종료 시각 숨김
                    if (wn)  wn.width  = '*';          // 남는 폭을 작업자가 채움
                    if (act) act.width = 132;          // 작업(시작/완료) 셀버튼
                    // 손가락 친화 행/헤더 높이
                    g.rows.defaultSize = 52;
                    g.columnHeaders.rows.defaultSize = 44;
                } else {
                    if (ch)  ch.width  = 50;
                    if (stn) stn.width = 60;
                    if (iq)  iq.width  = 60;
                    if (gq)  gq.width  = 70;
                    if (dq)  dq.width  = 70;
                    if (stt) { stt.visible = true; stt.width = 110; }
                    if (ett) { ett.visible = true; ett.width = 110; }
                    if (wn)  wn.width  = 90;
                    if (act) act.width = 120;
                    g.rows.defaultSize = 28;
                    g.columnHeaders.rows.defaultSize = 30;
                }
                g.invalidate();
                this.fitChasuGridHeight();
            }

            /* ── 범용: 태블릿에서 그리드 컬럼 폭/표시 조정 (투입·부적합·투입로트용) ──
               cfg = { star:'binding', hide:['binding',...], widths:{binding:px,...} }
               원본 폭/표시는 최초 1회 스냅샷 → PC 복귀 시 그대로 복원. */
            applyTouchColumns(grid, cfg, touch) {
                if (!grid || !grid.columns) return;
                cfg = cfg || {};
                grid.columns.forEach(col => {
                    if (!col.binding) return;                 // 액션 등 binding 없는 컬럼 제외
                    if (col.__ow === undefined) { col.__ow = col.width; col.__ov = col.visible; }
                    if (touch) {
                        if (cfg.hide && cfg.hide.includes(col.binding)) { col.visible = false; return; }
                        col.visible = true;
                        if (cfg.star === col.binding)                       col.width = '*';
                        else if (cfg.widths && cfg.widths[col.binding] != null) col.width = cfg.widths[col.binding];
                    } else {
                        col.visible = (col.__ov !== undefined ? col.__ov : true);
                        col.width   = (col.__ow !== undefined ? col.__ow : col.width);
                    }
                });
                grid.rows.defaultSize = touch ? 52 : 28;
                grid.columnHeaders.rows.defaultSize = touch ? 44 : 30;
                grid.invalidate();
            }

            /* ── 차수 그리드 높이: inline 강제값 해제 → CSS calc(뷰포트 채움)가 관장 ── */
            fitChasuGridHeight() {
                const g = this.chasuGrid;
                if (!g || !g.hostElement) return;
                g.hostElement.style.removeProperty('height');
                g.invalidate();
            }

        }
    </script>
</th:block>
