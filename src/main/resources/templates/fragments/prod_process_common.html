<!-- ============================================================
     fragments/prod_process_common.html
     공정별 생산실적 화면 공용 JS 프래그먼트
     - ProcPageBase (그리드/시작·종료/탭/버튼상태)
     - 기존 prod_result_lot의 CSS 클래스(tab-links, tab-item, work-table 등)를 사용
     ============================================================ -->
<!-- ▸ 공통 JS 유틸 -->
<th:block th:fragment="processCommonCss">
    <style>
        /* ════════════════════════════════════════════════════
           반응형 디자인 토큰 (PC / 태블릿·키오스크 / 모바일)
           - 기존 톤앤매너(파란 #1976d2, 상태색)를 변수로 승격
           ════════════════════════════════════════════════════ */
        :root {
            --prod-accent:        #1976d2;
            --prod-accent-dark:   #115293;
            --prod-c-working:     #e8f5e9;
            --prod-c-finished:    #e3f2fd;
            --prod-c-stopped:     #fce4ec;
            --prod-c-locked:      #bbbbbb;
            --prod-card-radius:   12px;
            --prod-card-shadow:   0 2px 6px rgba(0,0,0,.12);
            /* 터치 타깃 (태블릿 기준, 모바일에서 더 키움) */
            --prod-touch-min:     48px;
            --prod-font-base:     1.05rem;
        }

        /* ════════ ① 태블릿·키오스크 (601~1280px 또는 터치) ════════ */
        @media (pointer: coarse), (max-width: 1280px) {

            .tab-links a {
                font-size: 1.25rem !important;
                padding: 18px 28px !important;
                line-height: 1.2 !important;
            }
            .search-wrap input,
            .search-wrap select,
            .btn-search {
                font-size: var(--prod-font-base) !important;
                min-height: 44px !important;
            }
            .wj-flexgrid .wj-header { font-size: var(--prod-font-base) !important; }
            .wj-flexgrid .wj-cell   { font-size: clamp(0.9rem, 1.2vw, 1.2rem) !important; }

            .work-table th,
            .work-table td { font-size: var(--prod-font-base) !important; }
            .work-table input,
            .work-table select,
            .work-table textarea {
                font-size: var(--prod-font-base) !important;
                min-height: 42px !important;
            }
            .work-action-buttons .btn {
                font-size: 1.1rem !important;
                min-height: var(--prod-touch-min) !important;
                min-width: 90px !important;
            }
        }

        /* ════════ ② 모바일 (≤600px, 세로) ════════ */
        /* 카드뷰 컨테이너 — 평소엔 숨김, body.mobile-mode에서만 노출 */
        #proc-card-list { display: none; }

        body.mobile-mode #proc-main-grid { display: none !important; }
        body.mobile-mode #proc-card-list { display: block; }

        /* 모바일에서 좌우 2단 → 세로 1열 */
        body.mobile-mode .prod-flex { flex-direction: column !important; gap: 0 !important; }
        body.mobile-mode .prod-flex > .section,
        body.mobile-mode .prod-flex > .tab-wrap {
            width: 100% !important; flex: none !important; min-width: 0 !important;
        }

        /* 작업 카드 */
        .proc-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-left: 5px solid var(--prod-accent);
            border-radius: var(--prod-card-radius);
            box-shadow: var(--prod-card-shadow);
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform .05s ease;
        }
        .proc-card:active { transform: scale(0.985); }
        .proc-card.is-selected {
            border-color: var(--prod-accent);
            box-shadow: 0 0 0 2px var(--prod-accent);
        }
        /* 상태별 좌측 컬러바 */
        .proc-card.st-working  { border-left-color: #4caf50; background: var(--prod-c-working); }
        .proc-card.st-finished { border-left-color: #1976d2; background: var(--prod-c-finished); }
        .proc-card.st-stopped  { border-left-color: #e91e63; background: var(--prod-c-stopped); }
        .proc-card.st-locked   { border-left-color: var(--prod-c-locked); opacity: .7; }

        .proc-card .pc-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; gap: 8px;
        }
        .proc-card .pc-name {
            font-size: 1.15rem; font-weight: 700; color: #222;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .proc-card .pc-badge {
            flex: none; font-size: .85rem; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            background: var(--prod-accent); color: #fff;
        }
        .proc-card .pc-badge.st-working  { background: #4caf50; }
        .proc-card .pc-badge.st-finished { background: #1976d2; }
        .proc-card .pc-badge.st-stopped  { background: #e91e63; }
        .proc-card .pc-badge.st-locked   { background: #9e9e9e; }
        .proc-card .pc-badge.st-ordered  { background: #757575; }

        .proc-card .pc-meta {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
            font-size: .95rem; color: #555;
        }
        .proc-card .pc-meta b { color: #222; font-weight: 600; }
        .proc-card .pc-lock-msg {
            margin-top: 8px; font-size: .85rem; color: #c62828; font-weight: 600;
        }

        @media (max-width: 600px) {
            body.mobile-mode .tab-links a { font-size: 1.05rem !important; padding: 12px 14px !important; }
            /* 기본정보 폼 1열 풀폭 */
            body.mobile-mode .work-table colgroup,
            body.mobile-mode .work-table col { width: auto !important; }
            body.mobile-mode .work-table th,
            body.mobile-mode .work-table td {
                display: block !important; width: 100% !important;
                box-sizing: border-box;
            }
            body.mobile-mode .work-table th {
                background: #f7f7f7; padding: 8px 10px !important;
                border-bottom: none !important;
            }
            body.mobile-mode .work-table input,
            body.mobile-mode .work-table select,
            body.mobile-mode .work-table textarea {
                width: 100% !important; min-height: 46px !important;
                font-size: 1.05rem !important; box-sizing: border-box;
            }
        }

        /* ════════════════════════════════════════════════════
           태블릿/키오스크/모바일: 하단 고정 액션바 + 폼 정갈화
           (touch-mode = 태블릿·키오스크, mobile-mode = 모바일)
           ════════════════════════════════════════════════════ */

        /* ── (1) 시작/완료만 하단 sticky 바, 나머지 4개(일시중지/완료취소/저장/삭제)는 원위치 유지 ── */
        /* 시작/완료를 하단에 고정한 바 컨테이너는 JS로 #stickyActionBar에 옮겨 담음 */
        #stickyActionBar { display: none; }
        body.touch-mode #stickyActionBar,
        body.mobile-mode #stickyActionBar {
            display: flex;
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 1200;
            gap: 10px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            box-shadow: 0 -2px 8px rgba(0,0,0,.08);
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;
        }
        body.touch-mode #stickyActionBar > button,
        body.mobile-mode #stickyActionBar > button {
            flex: 1 1 0;
            min-height: 56px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            color: #fff;
            border: none;
        }
        #stickyActionBar #btnWorkStart  { background: #4caf50; }
        #stickyActionBar #btnWorkFinish { background: #1976d2; }
        /* 현재 상태에서 못 쓰는 버튼(예: 생산중의 '시작')은 숨겨 남은 버튼이 폭을 다 차지 */
        #stickyActionBar > button[disabled] { display: none !important; }
        /* 활성 버튼이 하나도 없으면(완료/중지 등) 바 자체를 숨김 */
        #stickyActionBar.is-empty { display: none !important; }
        /* 작지 시작/마감이 필요 없는 탭(차수·투입·부적합)에선 하단 스티키 숨김 — 작업은 그리드 버튼으로 */
        body.touch-mode[data-active-tab="tabChasu"] #stickyActionBar,
        body.touch-mode[data-active-tab="tabConsumed"] #stickyActionBar,
        body.touch-mode[data-active-tab="tabDefect"] #stickyActionBar,
        body.mobile-mode[data-active-tab="tabChasu"] #stickyActionBar { display: none !important; }
        body.touch-mode[data-active-tab="tabChasu"] #tabChasu,
        body.touch-mode[data-active-tab="tabConsumed"] #tabConsumed,
        body.touch-mode[data-active-tab="tabDefect"] #tabDefect { padding-bottom: 24px !important; }
        /* 차수탭은 스티키가 없으니 그리드를 바닥 가까이까지 채움 */
        body.touch-mode[data-active-tab="tabChasu"] #chasu-grid {
            height: calc(100vh - 250px) !important;
            min-height: 340px !important;
        }
        /* PC 모드: 마크업 인라인 height:200px 때문에 안 차던 것 → 화면 높이에 맞춰 채움 */
        body:not(.touch-mode):not(.mobile-mode) #chasu-grid {
            height: calc(100vh - 320px) !important;
            min-height: 320px !important;
        }

        /* 모바일(세로): 시작/완료 세로로 쌓기 */
        body.mobile-mode #stickyActionBar { flex-direction: column; }

        /* 스티키 바(시작/완료)가 콘텐츠를 가리지 않도록 모든 탭에 하단 여백 ──
           스티키 높이(버튼56 + 상하패딩20 ≈ 80) + 그리드 스크롤 여유 */
        body.touch-mode #tabBasic,
        body.touch-mode #tabList,
        body.touch-mode #tabConsumed,
        body.touch-mode #tabChasu,
        body.touch-mode #tabDefect {
            padding-bottom: 100px !important;
        }
        /* ── 태블릿 그리드 높이 통일 (기준: 차수 그리드) ──
           목록/부적합/투입 그리드는 하단 스티키 높이만큼 위에서 끝나도록 보정해
           차수 탭과 시각적으로 동일하게 화면을 채움. */
        /* 목록(검색바 + 스티키 있음): 한 단계 낮은 높이 */
        body.touch-mode #tabList #proc-main-grid {
            height: calc(100vh - 340px) !important;
            min-height: 300px !important;
        }
        /* 투입·부적합(스티키 없앰): 차수와 동일하게 바닥까지 채움 */
        body.touch-mode #consumed-grid,
        body.touch-mode #defect-grid {
            height: calc(100vh - 250px) !important;
            min-height: 340px !important;
        }
        /* 투입 로트(토글로 열리는 보조 그리드)는 보조 높이 */
        body.touch-mode #input-lot-grid {
            height: calc(40vh - 60px) !important;
            min-height: 200px !important;
        }

        /* 하단 바에 가려지지 않도록 폼 영역에 아래 여백 확보 */
        body.mobile-mode #tabBasic { padding-bottom: 150px; }

        /* 남은 상단 버튼줄(일시중지/완료취소/저장/삭제): 태블릿/모바일에서 적당히 키움 */
        body.touch-mode .work-action-buttons .btn,
        body.mobile-mode .work-action-buttons .btn {
            min-height: 44px !important;
            font-size: 1rem !important;
        }
        /* 일시중지: 연한 주황 (눈에 띄게) */
        body.touch-mode #btnWorkStop:not([disabled]),
        body.mobile-mode #btnWorkStop:not([disabled]) {
            background: #fff3e0 !important;
            color: #e65100 !important;
            border: 1px solid #ffb74d !important;
        }

        /* ── (2) 기본정보 input 폭 통일 + th 정리 (PC 포함 전체 적용) ── */
        .work-table { table-layout: fixed; width: 100%; }
        /* th 폭 고정 (라벨이 길어도 일정) */
        .work-table th {
            width: 120px;
            text-align: right;
            padding-right: 14px;
            white-space: nowrap;
            color: #444;
            font-weight: 600;
        }
        /* input/select/textarea 폭 100% 통일 (인라인 style 덮어쓰기) */
        .work-table td input:not([type=checkbox]):not([type=radio]),
        .work-table td select,
        .work-table td textarea {
            width: 100% !important;
            box-sizing: border-box;
            max-width: 100%;
        }
        /* 날짜+시간 같은 input-group은 가로 유지 */
        .work-table td .input-group {
            display: flex; gap: 6px; width: 100%;
        }
        .work-table td .input-group input { flex: 1 1 0; min-width: 0; }

        /* ── 모바일(세로) 그리드 높이 — 모바일은 보류, 기존값 유지 ── */
        body.mobile-mode #consumed-grid  { height: calc(50vh - 120px) !important; min-height: 220px !important; }
        body.mobile-mode #input-lot-grid { height: calc(45vh - 120px) !important; min-height: 200px !important; }
        body.mobile-mode #chasu-grid     { height: calc(100vh - 360px) !important; min-height: 240px !important; }
        body.mobile-mode #defect-grid    { height: calc(100vh - 320px) !important; min-height: 240px !important; }

        /* ════ 태블릿 글자/입력 정리 (태블릿 모드 토글 시 적용) ════ */
        /* (1) 검색 영역 글자 키움 */
        body.touch-mode .search-wrap dt,
        body.touch-mode .search-wrap label,
        body.touch-mode .search-wrap .srch-box { font-size: 1.1rem !important; }
        body.touch-mode .search-wrap input,
        body.touch-mode .search-wrap select,
        body.touch-mode .btn-search {
            font-size: 1.12rem !important;
            min-height: 48px !important;
            padding: 6px 12px !important;
            box-sizing: border-box;
        }
        /* (3) 그리드 본문 글자 — 행이 커진 만큼 함께 키움 */
        body.touch-mode .wj-flexgrid .wj-header { font-size: 1.1rem !important; }
        body.touch-mode .wj-flexgrid .wj-cell   { font-size: 1.12rem !important; }
        /* (4) 폼 입력 — 글자 키우고 좌우 여백 + 좌측정렬로 가장자리 쏠림 해소 */
        body.touch-mode .work-table input:not([type=checkbox]):not([type=radio]),
        body.touch-mode .work-table select,
        body.touch-mode .work-table textarea {
            font-size: 1.12rem !important;
            min-height: 48px !important;
            padding: 8px 12px !important;
            line-height: 1.3 !important;
            box-sizing: border-box;
        }
        body.touch-mode .work-table input[type=text],
        body.touch-mode .work-table input[type=date],
        body.touch-mode .work-table input[type=time],
        body.touch-mode .work-table input:not([type]),
        body.touch-mode .search-wrap input { text-align: left !important; }
        /* ── 작업 버튼 비활성: 색 빼고 회색 (활성/비활성 구분) ── */
        button#btnWorkStart[disabled],
        button#btnWorkStop[disabled],
        button#btnWorkFinish[disabled],
        #stickyActionBar #btnWorkStart[disabled],
        #stickyActionBar #btnWorkFinish[disabled] {
            background: #e9ecef !important;
            color: #adb5bd !important;
            border: 1px solid #dee2e6 !important;
            box-shadow: none !important;
            opacity: 1 !important;
            cursor: not-allowed !important;
        }
        /* 활성 시 또렷한 색 (페이지의 !important 색을 확실히 이김) */
        button#btnWorkStart:not([disabled]),
        #stickyActionBar #btnWorkStart:not([disabled]) {
            background: #4caf50 !important; color: #fff !important;
        }
        button#btnWorkFinish:not([disabled]),
        #stickyActionBar #btnWorkFinish:not([disabled]) {
            background: #1976d2 !important; color: #fff !important;
        }
        button#btnWorkStop:not([disabled]) {
            background: #ff9800 !important; color: #fff !important;
        }

        /* ── (4) 차수 탭: 작업 셀 풀버튼 ── */
        body.touch-mode #chasu-grid .wj-cell.chasu-action { padding: 5px 6px !important; }

        /* ── 차수 배정 툴바 (#tabChasu .button-wrap) 태블릿 디자인 ──
           ul > li 구조: 1=지시량 2=| 3=잔여 4=| 5=작업자 6=수량 7=추가 8=삭제 */
        body.touch-mode #tabChasu .button-wrap {
            padding: 14px 16px !important;
            background: #f7f9fb !important;
            border: 1px solid #e6e9ee !important;
            border-radius: 12px !important;
        }
        body.touch-mode #tabChasu .button-wrap > ul {
            gap: 14px !important;
            align-items: center !important;
        }
        body.touch-mode #tabChasu .button-wrap li {
            font-size: 1.1rem !important;
            display: flex; align-items: center; gap: 8px;
        }
        /* 지시량 / 잔여 → 정보 칩 */
        body.touch-mode #tabChasu .button-wrap li:nth-child(1),
        body.touch-mode #tabChasu .button-wrap li:nth-child(3) {
            background: #fff; border: 1px solid #e6e9ee;
            border-radius: 8px; padding: 8px 14px;
            color: #667085; font-size: 1rem !important;
        }
        body.touch-mode #tabChasu .button-wrap li:nth-child(1) strong,
        body.touch-mode #tabChasu .button-wrap li:nth-child(3) strong {
            font-size: 1.35rem; color: #1976d2;
        }
        /* 구분선(|) li 숨김 — 칩으로 구분됨 */
        body.touch-mode #tabChasu .button-wrap li:nth-child(2),
        body.touch-mode #tabChasu .button-wrap li:nth-child(4) { display: none !important; }
        /* 입력 그룹(작업자~)을 오른쪽으로 밀기 */
        body.touch-mode #tabChasu .button-wrap li:nth-child(5) { margin-left: auto; }
        /* 컨트롤 사이즈 (인라인 width 덮어씀) */
        body.touch-mode #chasuWorker {
            min-width: 200px !important; height: 48px !important;
            font-size: 1.1rem !important; box-sizing: border-box;
        }
        body.touch-mode #chasuQty {
            width: 100px !important; height: 48px !important;
            font-size: 1.1rem !important; text-align: right; box-sizing: border-box;
        }
        body.touch-mode #btnAddChasu {
            height: 48px !important; padding: 0 22px !important;
            font-size: 1.1rem !important; font-weight: 600 !important;
            background: #1976d2 !important; color: #fff !important;
            border: none !important; border-radius: 8px !important;
        }
        body.touch-mode #btnAddChasu[disabled] {
            background: #e9ecef !important; color: #adb5bd !important;
        }
        body.touch-mode #btnDeleteChasu {
            height: 48px !important; width: 48px !important; padding: 0 !important;
            font-size: 1.2rem !important; border-radius: 8px !important;
        }
    </style>
</th:block>

<th:block th:fragment="processCommonJS">
    <script type="text/javascript">
        // (구) window.DISABLE_GLOBAL_LAYOUT_TOGGLE = true;  ← 제거:
        //   layout_page.html의 "제목 클릭 → 메뉴/헤더 펼치기" 핸들러를 살리기 위함.
        //   우리 initLayoutCollapse는 뷰모드 버튼으로 별도 제어하므로 둘이 공존 가능.
        /**
         * ProcPageBase - 공정별 페이지 공통 로직
         * 각 공정 페이지에서 extends 하거나 직접 사용
         */
        class ProcPageBase {
            constructor(processCode, spjangcd) {
                this.processCode = processCode; // e.g. 'p01'
                this.spjangcd = sessionStorage.getItem(spjangcd);  // 사업장코드
                this.baseUrl = '/api/production/prod_result';
                this.grid = null;
                this.chasuGrid = null;
                this.defectGrid = null;
                this.consumedGrid = null;
                this.inputLotGrid = null;
                this.jobres = null;
                this.selectedIndex = null;
                this.$form = $('#basicForm');
            }

            /* ── 메인 그리드 초기화 ── */
            initMainGrid() {
                const _this = this;
                this.grid = new wijmo.grid.FlexGrid('#proc-main-grid', {
                    autoGenerateColumns: false,
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    headersVisibility: wijmo.grid.HeadersVisibility.Column,
                    isReadOnly: true,
                    showMarquee: true,
                    allowResizing: wijmo.grid.AllowResizing.Columns,  // 컬럼 크기 조절 허용(터치 포함)
                    columns: [
                        { binding: 'order_num',    header: '작지번호',  width: 160, align: 'center' },
                        { binding: 'mat_name',     header: '품목',     width: '*',  align: 'left', minWidth: 120 },
                        { binding: 'mat_code',     header: '품목코드',  width: 110, align: 'center' },
                        { binding: 'job_state',    header: '상태',     width: 100,  align: 'center' },
                        { binding: 'order_qty',    header: '지시량',   width: 80,  format: 'n0', align: 'right' },
                        { binding: 'good_qty',     header: '양품량',   width: 80,  format: 'n0', align: 'right' },
                        { binding: 'worker_name',  header: '관리자',   width: 90,  align: 'center' },
                        { binding: 'equ_name',     header: '설비',     width: 100, align: 'center' },
                        { binding: 'prod_date',    header: '생산일',   width: 100, align: 'center' },
                        { binding: 'company_name', header: '판매처',   width: 100, align: 'left' },
                    ],
                    formatItem: (sender, e) => {
                        if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
                            e.cell.style.textAlign = 'center';
                        }
                    },
                    itemFormatter: (panel, row, col, cell) => {
                        if (panel.cellType === wijmo.grid.CellType.Cell) {
                            const item = panel.rows[row].dataItem;
                            if (!item) return;
                            // 상태별 행 색상 (default 페이지 CSS)
                            cell.classList.remove('row-working', 'row-finished', 'row-stopped', 'row-locked');
                            if (item.state === 'working')  cell.classList.add('row-working');
                            if (item.state === 'finished') cell.classList.add('row-finished');
                            if (item.state === 'stopped')  cell.classList.add('row-stopped');
                            if (item._locked)              cell.classList.add('row-locked');
                        }
                    }
                });

                this.grid.hostElement.addEventListener('click', (e) => {
                    const ht = _this.grid.hitTest(e);
                    if (ht.cellType !== wijmo.grid.CellType.Cell) return;
                    const item = _this.grid.rows[ht.row]?.dataItem;
                    if (!item) return;
                    console.log('클릭한 행 id:', item.id, '품목:', item.mat_name);

                    _this.selectedIndex = ht.row;
                    _this.jobres = item;

                    // ★ 전 공정 미완료: 경고만 표시, 선택은 허용 (작업시작 시 서버에서 검증)
                    if (item._locked) {
                        Notify.warning('전 공정이 완료되지 않았습니다. 확인 후 진행하세요.');
                    }
                    _this.showBasicInfo(item.id);
                });
            }

            /* ── 데이터 조회 (공정 필터 + step 게이팅) ── */
            searchMainData() {
                const _this = this;
                const prevId = _this.jobres?.id || null;

                const param = {
                    date_from: $('#date_from').val(),
                    date_to: $('#date_to').val(),
                    item: $('#ItemSearch').val(),            // ★ 품목(코드/명) 검색
                    is_include_comp: $('#chxCompYn').is(':checked'),
                    process_code: this.processCode  // ★ 공정코드 필터
                };

                const result = AjaxUtil.getSyncData(this.baseUrl + '/read_by_process', param);
                if (!result.data) {
                    _this._lastData = [];
                    _this.renderMobileCards([]);
                    return;
                }

                // step 게이팅: _locked 플래그 추가 (서버에서 내려줘도 되고 프론트에서도 가능)
                const data = result.data;

                if (_this.grid.itemsSource) {
                    const view = _this.grid.itemsSource;
                    view.sourceCollection.splice(0, view.sourceCollection.length, ...data);
                    view.refresh();
                } else {
                    _this.grid.itemsSource = new wijmo.collections.CollectionView(data);
                }

                // 이전 선택 복구
                if (prevId) {
                    const idx = data.findIndex(d => d.id === prevId);
                    if (idx >= 0) {
                        _this.grid.select(idx, 0);
                        _this.jobres = data[idx];
                    } else {
                        _this.resetForm();
                    }
                }

                // ★ 모바일 카드뷰 동기화 (데이터 소스 1벌 유지)
                _this._lastData = data;
                _this.renderMobileCards(data);
            }

            /* ── 모바일: 그리드 데이터를 카드형으로 렌더링 ──
               데이터는 searchMainData가 채운 동일 소스(_lastData)를 사용.
               카드 클릭 = 그리드 행 클릭과 동일하게 showBasicInfo 호출. */
            renderMobileCards(data) {
                const _this = this;
                let $box = $('#proc-card-list');
                // 컨테이너가 없으면 메인 그리드 바로 뒤에 생성
                if (!$box.length) {
                    $('#proc-main-grid').after('<div id="proc-card-list"></div>');
                    $box = $('#proc-card-list');
                }
                // 모바일 모드가 아니면 렌더 비용 절약 (display:none이지만 DOM은 비워둠)
                if (!$('body').hasClass('mobile-mode')) { $box.empty(); return; }

                const list = data || _this._lastData || [];
                if (!list.length) {
                    $box.html('<div style="padding:24px; text-align:center; color:#888;">조회된 작업이 없습니다.</div>');
                    return;
                }

                const stateClass = (st) => {
                    switch (st) {
                        case 'working':  return 'st-working';
                        case 'finished': return 'st-finished';
                        case 'stopped':  return 'st-stopped';
                        default:         return 'st-ordered';
                    }
                };
                const esc = (v) => (v == null ? '' : String(v)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));

                let html = '';
                list.forEach((item, idx) => {
                    const locked = !!item._locked;
                    const sc = locked ? 'st-locked' : stateClass(item.state);
                    const badgeTxt = esc(item.job_state || '작업지시');
                    html += `
                        <div class="proc-card ${sc}" data-idx="${idx}" data-id="${esc(item.id)}">
                            <div class="pc-top">
                                <span class="pc-name">${esc(item.mat_name) || '-'}</span>
                                <span class="pc-badge ${locked ? 'st-locked' : stateClass(item.state)}">${badgeTxt}</span>
                            </div>
                            <div class="pc-meta">
                                <span>작지 <b>${esc(item.order_num) || '-'}</b></span>
                                <span>코드 <b>${esc(item.mat_code) || '-'}</b></span>
                                <span>지시 <b>${esc(item.order_qty ?? 0)}</b></span>
                                <span>양품 <b>${esc(item.good_qty ?? 0)}</b></span>
                                <span>작업자 <b>${esc(item.worker_name) || '-'}</b></span>
                                <span>설비 <b>${esc(item.equ_name) || '-'}</b></span>
                            </div>
                            ${locked ? '<div class="pc-lock-msg">⚠ 전 공정 미완료 — 확인 후 진행</div>' : ''}
                        </div>`;
                });
                $box.html(html);

                // 선택 복구 표시
                if (_this.jobres) {
                    $box.find(`.proc-card[data-id="${_this.jobres.id}"]`).addClass('is-selected');
                }

                // 카드 클릭 → 그리드 행 클릭과 동일 동작
                $box.off('click', '.proc-card').on('click', '.proc-card', function () {
                    const i = parseInt($(this).attr('data-idx'), 10);
                    const item = list[i];
                    if (!item) return;

                    _this.selectedIndex = i;
                    _this.jobres = item;

                    // 그리드 선택도 동기화 (탭/버튼 상태 로직이 grid 선택에 의존할 수 있음)
                    try { _this.grid.select(i, 0); } catch (e) {}

                    $box.find('.proc-card').removeClass('is-selected');
                    $(this).addClass('is-selected');

                    if (item._locked) {
                        Notify.warning('전 공정이 완료되지 않았습니다. 확인 후 진행하세요.');
                    }
                    _this.showBasicInfo(item.id);

                    // 모바일: 카드 선택 시 '기본 정보' 탭으로 자동 전환
                    if ($('body').hasClass('mobile-mode')) {
                        $('.tab-wrap .tab-item').hide();
                        $('#tabBasic').show();
                        $('.tab-links li').removeClass('active');
                        $('.tab-links a[name="tabBasic"]').parent('li').addClass('active');
                    }
                });
            }

            /* ── 기본정보 표시 ── */
            showBasicInfo(jr_pk) {
                const res = AjaxUtil.getSyncData(this.baseUrl + '/detail_process', { jr_pk });
                const d = res.data;
                if (!d) return;

                $('#jr_id').val(d.id);
                $('#parent_jr_pk').val(d.parent_jr_pk || d.parent_id || '');
                $('#routing_id').val(d.routing_id || '');
                $('#workcenter_id').val(d.workcenter_id || '');
                $('#wcfactory_id').val(d.wcfactory_id || '');
                $('#mat_pk').val(d.mat_pk || d.material_id || '');
                $('#order_num').val(d.order_num || '');
                $('#mat_code').val(d.mat_code || '');
                $('#mat_name').val(d.mat_name || '');
                $('#unit').val(d.unit || '');
                // 공정명(#process_name)은 페이지 로드 시 한 번 세팅됨(읽기전용)
                $('#workcenter_name').val(d.workcenter_name || '');

                $('#prod_date').val(d.prod_date || '');
                $('#start_time').val(d.start_time || '');
                $('#end_date').val(d.end_date || '');
                $('#end_time').val(d.end_time || '');

                $('#order_qty').val(d.order_qty ?? 0);
                $('#good_qty').val(d.good_qty ?? 0);
                $('#defect_qty').val(d.defect_qty ?? 0);
                $('#ordqty').text((d.order_qty ?? 0).toLocaleString());
                $('#chasuLotSize').val(d.order_qty ?? 0);

                const state = d.state || 'ordered';
                const stateMap = { 'ordered': '작업지시', 'working': '생산중', 'finished': '생산완료', 'stopped': '일시중지', 'wait': '대기' };
                $('#state').val(state);
                $('#job_state').val(stateMap[state] || state);
                $('#description').val(d.description || '');

                $('#consumed_mode').val('ACTUAL');
                $('#prod_mat_id').val(d.prod_mat_id || '');
                $('#prod_mat_nm').val(d.prod_mat_nm || '');
                $('#need_pro_mat_qty').val(d.need_pro_mat_qty || '');

                AjaxUtil.fillSelectedOptions($('#manager_id'), 'person', 'choose', d.manager_id || '', '');
                AjaxUtil.fillSelectedOptions($('#equipment_id'), 'equipment_code', 'choose', d.equipment_id || '', d.workcenter_id);

                this.showChasuList(jr_pk);
                this.showConsumedList(jr_pk);
                this.showDefectList(jr_pk);
                this.showInputLotList(jr_pk);

                // 공정별 추가 처리 훅 (machining의 PLC 등)
                if (typeof this.afterShowBasicInfo === 'function') {
                    this.afterShowBasicInfo(d);
                }

                this.setButtonState();
                if ($('body').hasClass('touch-mode')) {
                    // ★ state별 탭 자동 이동
                    //   생산중(working) → 차수별생산 탭 / 그 외(지시·완료·일시중지) → 기본정보 탭
                    const _st = $('#state').val();
                    const _tab = (_st === 'working') ? 'tabChasu' : 'tabBasic';
                    $('.tab-links a[name="' + _tab + '"]').click();
                }
            }

            /* ── 버튼 상태 관리 ── */
            setButtonState() {
                const state = $('#state').val();
                const $start  = $('#btnWorkStart');
                const $stop   = $('#btnWorkStop');
                const $finish = $('#btnWorkFinish');
                const $cancel = $('#btnFinishCancel');
                const $save   = $('#btnSave');
                const $del    = $('#btnDel');
                const $addChasu = $('#btnAddChasu');
                const $delChasu = $('#btnDeleteChasu');

                // 전부 비활성
                [$start, $stop, $finish, $cancel, $save, $del, $addChasu, $delChasu].forEach(b => b.prop('disabled', true));

                switch (state) {
                    case 'ordered':
                        $start.prop('disabled', false);
                        $save.prop('disabled', false);
                        $del.prop('disabled', false);
                        this.toggleFormEditable(true);
                        break;
                    case 'working':
                        $stop.prop('disabled', false).text('일시중지');
                        $finish.prop('disabled', false);
                        $save.prop('disabled', false);
                        $('#btnDefectSave').prop('disabled', false);
                        // 생산중일 때 차수 배정/삭제 가능
                        $addChasu.prop('disabled', false);
                        $delChasu.prop('disabled', false);
                        this.toggleFormEditable(false);
                        break;
                    case 'stopped':
                        $stop.prop('disabled', false).text('재가동');
                        $save.prop('disabled', false);
                        this.toggleFormEditable(false);
                        break;
                    case 'finished':
                        $cancel.prop('disabled', false);
                        this.toggleFormEditable(false);
                        break;
                    default:
                        $start.prop('disabled', false);
                        $save.prop('disabled', false);
                        this.toggleFormEditable(true);
                }

                // ★ 스티키: 활성 버튼 없으면 바 숨김 (빈 줄/그림자 잔상 방지)
                const $sb = $('#stickyActionBar');
                if ($sb.length) {
                    $sb.toggleClass('is-empty', $sb.find('button:not([disabled])').length === 0);
                }
            }

            toggleFormEditable(editable) {
                // 시작 전: 작업자/설비 선택 가능
                $('#manager_id, #equipment_id').prop('disabled', !editable);
            }

            /* ── 작업 시작 ── */
            workStart() {
                const _this = this;
                const data = FormUtil.extractForm(this.$form);
                const prevIdx = this.selectedIndex;

                // 필수 체크
                if (!data.manager_id)    { Alert.alert('', '작업자를 선택해주세요.'); return; }
                if (!data.equipment_id) { Alert.alert('', '설비를 선택해주세요.'); return; }

                // 시작시간 기본값
                if (!data.start_time) {
                    const now = new Date();
                    data.start_time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
                }
                if (!data.prod_date) {
                    const now = new Date();
                    data.prod_date = now.toISOString().slice(0, 10);
                }

                data.id = $('#jr_id').val();
                data.workcenter_id = $('#workcenter_id').val();
                data.spjangcd = this.spjangcd || '';

                AjaxUtil.postAsyncData(this.baseUrl + '/work_start', data, (res) => {
                    if (res?.success) {
                        Notify.success('작업이 시작되었습니다.');
                        const childId = res.data?.jr_pk || data.id;
                        $('#jr_id').val(childId);
                        $('#state').val('working');
                        _this.searchMainData();
                        _this.showBasicInfo(childId);

                        // ★ jobres 복구 (searchMainData에서 유실될 수 있음)
                        if (!_this.jobres) {
                            const dataSource = _this.grid.itemsSource;
                            const items = dataSource instanceof wijmo.collections.CollectionView
                                ? dataSource.sourceCollection : dataSource;
                            if (Array.isArray(items)) {
                                const found = items.find(d => String(d.id) === String(childId));
                                if (found) _this.jobres = found;
                            }
                        }

                        setTimeout(() => _this.grid.select(prevIdx, 0), 100);

                        // ★ 시작 후 차수별 생산 탭으로 자동 이동
                        setTimeout(() => {
                            $('.tab-links a[name="tabChasu"]').click();
                        }, 200);
                    } else {
                        Alert.alert('시작 실패', res?.message || '');
                    }
                });
            }

            /* ── 작업 완료 (간소화: 지시량 → 양품량 자동) ── */
            workFinish() {
                const _this = this;
                const data = FormUtil.extractForm(this.$form);
                const prevIdx = this.selectedIndex;
                const childId = $('#jr_id').val();
                data.id = childId;

                // 종료시간 자동
                const now = new Date();
                const pad2 = n => String(n).padStart(2, '0');
                data.end_date = `${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`;
                data.end_time = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;

                // 진행중(미종료) 차수가 있으면 막기
                const chasuItems = _this.chasuGrid?.collectionView?.items || [];
                const unfinished = chasuItems.filter(it => it.state !== 'finished');
                if (unfinished.length > 0) {
                    Alert.alert('완료 불가', '아직 종료되지 않은 차수가 있습니다.');
                    return;
                }
                if (chasuItems.length === 0) {
                    Alert.alert('완료 불가', '생산 실적(차수)이 없습니다. 먼저 생산을 등록해주세요.');
                    return;
                }

                _this._doFinish(data, prevIdx);
            }

            _doFinish(data, prevIdx) {
                const _this = this;
                AjaxUtil.postAsyncData(this.baseUrl + '/work_finish', data, (res) => {
                    if (res?.success) {
                        Notify.success('작업이 완료되었습니다.');
                        $('#state').val('finished');
                        _this.searchMainData();
                        _this.showBasicInfo(res.data?.jr_pk || data.id);
                        setTimeout(() => _this.grid.select(prevIdx, 0), 100);
                    } else {
                        Alert.alert('완료 실패', res?.message || '');
                    }
                });
            }

            /* ── 차수 추가 (작업자 배정 or 즉시생산) ── */
            addChasu() {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                const workcenter_id = $('#workcenter_id').val();
                const worker_id = $('#chasuWorker').val();   // 빈값이면 즉시생산
                const qty = parseFloat($('#chasuQty').val()) || 0;

                if (!jr_pk) { Alert.alert('', '작업을 먼저 선택해주세요.'); return; }
                if (qty <= 0) { Alert.alert('', '수량을 입력해주세요.'); return; }

                AjaxUtil.postAsyncData(this.baseUrl + '/chasu_add', {
                    jr_pk, workcenter_id, worker_id, qty,
                    spjangcd: this.spjangcd || ''
                }, (res) => {
                    if (res?.success) {
                        Notify.success(worker_id ? '작업이 배정되었습니다.' : '생산이 등록되었습니다.');
                        $('#chasuQty').val(0);
                        _this.showChasuList(jr_pk);
                        _this.refreshAfterChasu(jr_pk);
                        _this.showBasicInfo(jr_pk);
                        _this.searchMainData();
                    } else {
                        Alert.alert('차수 추가 실패', res?.message || '');
                    }
                });
            }

            /* ── 차수 시작 (자재 차감 시점) ── */
            /* ── 차수 시작 (자재 차감 시점) ── */
            startChasu(mpId) {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                AjaxUtil.postAsyncData(this.baseUrl + '/chasu_start', { mp_id: mpId, spjangcd: this.spjangcd || '' }, (res) => {
                    if (res?.success) {
                        Notify.success('작업을 시작했습니다.');
                        _this.showChasuList(jr_pk);
                    } else {
                        Alert.alert('시작 실패', res?.message || '');
                    }
                });
            }

            /* ── 차수 종료 (양품 확정 + 입고) ── */
            /* ── 차수 종료 (양품/부적합 확정 + 입고) ── */
            finishChasu(mpId) {
                const _this = this;
                const jr_pk = $('#jr_id').val();

                // 그리드에서 해당 차수 행의 양품/부적합 값 읽기
                const items = this.chasuGrid?.collectionView?.items || [];
                const row = items.find(it => String(it.id) === String(mpId));
                if (!row) { Alert.alert('', '차수를 찾을 수 없습니다.'); return; }

                const goodQty = parseFloat(row.good_qty) || 0;
                const defectQty = parseFloat(row.defect_qty) || 0;

                if (goodQty <= 0 && defectQty <= 0) {
                    Alert.alert('', '양품량 또는 부적합량을 입력한 후 종료해주세요.');
                    return;
                }

                Alert.confirm('작업 종료',
                    `양품 ${goodQty}, 부적합 ${defectQty}로 종료하시겠습니까?`,
                    () => {
                        AjaxUtil.postAsyncData(_this.baseUrl + '/chasu_finish', {
                            mp_id: mpId, good_qty: goodQty, defect_qty: defectQty,
                            spjangcd: _this.spjangcd || ''
                        }, (res) => {
                            if (res?.success) {
                                Notify.success('작업을 종료했습니다.');
                                _this.showChasuList(jr_pk);
                                _this.refreshAfterChasu(jr_pk);
                                _this.searchMainData();
                                _this.showBasicInfo(jr_pk);
                                if (res.data && res.data.job_finished) {
                                    Notify.success('모든 차수 완료 → 공정이 자동 완료되었습니다.');
                                }
                            } else {
                                Alert.alert('종료 실패', res?.message || '');
                            }
                        });
                    }
                );
            }

            /* ── 차수 완료취소 ── */
            cancelFinishChasu(mpId) {
                const _this = this;
                const jr_pk = $('#jr_id').val();

                Alert.confirm('차수 완료취소', '해당 차수의 완료를 취소하시겠습니까?\n(입고된 수량이 차감됩니다)', () => {
                    AjaxUtil.postAsyncData(_this.baseUrl + '/chasu_finish_cancel', {
                        mp_id: mpId, jr_pk,
                        spjangcd: _this.spjangcd || ''
                    }, (res) => {
                        if (res?.success) {
                            Notify.success('차수 완료가 취소되었습니다.');
                            _this.showChasuList(jr_pk);
                            _this.refreshAfterChasu(jr_pk);
                            _this.showBasicInfo(jr_pk);   // ← 추가
                            _this.searchMainData();
                        } else {
                            Alert.alert('취소 실패', res?.message || '');
                        }
                    });
                });
            }

            /* ── 차수 삭제 (선택한 차수) ── */
            deleteChasu() {
                const _this = this;
                const jr_pk = $('#jr_id').val();
                if (!this.chasuGrid) return;

                const selItems = this.chasuGrid.selectedItems;
                if (!selItems || selItems.length === 0) { Alert.alert('', '삭제할 차수를 선택해주세요.'); return; }

                const item = selItems[0];

                Alert.confirm('차수 삭제', `${item.chasu}차수 (${item.worker_name || '미지정'})를 삭제하시겠습니까?`, () => {
                    AjaxUtil.postAsyncData(_this.baseUrl + '/chasu_del', {
                        jr_pk, mp_id: item.id
                    }, (res) => {
                        if (res?.success) {
                            Notify.success('차수가 삭제되었습니다.');
                            _this.showChasuList(jr_pk);
                            _this.refreshAfterChasu(jr_pk);
                            _this.showBasicInfo(jr_pk);   // ← 추가
                            _this.searchMainData();
                        } else {
                            Alert.alert('삭제 실패', res?.message || '');
                        }
                    });
                });
            }

            /* ── 차수 변동 후 잔여수량/상태 갱신 ── */
            refreshAfterChasu(jr_pk) {
                // 양품 합계 / 잔여 재계산
                const orderQty = parseFloat($('#order_qty').val()) || 0;
                const items = this.chasuGrid?.collectionView?.items || [];
                let assigned = 0;
                items.forEach(it => {
                    // 종료된 차수는 양품량, 진행/배정 차수는 배정량으로 잔여 계산
                    assigned += parseFloat(it.input_qty || it.good_qty || 0);
                });
                const remain = Math.max(0, orderQty - assigned);
                $('#remainQty').text(remain.toLocaleString());
                $('#chasuQty').val(remain);  // 기본값 = 잔여 전체
            }

            /* ── 작업 일시중지/재가동 ── */
            workStop() {
                const state = $('#state').val();
                // ★ jobres가 null이면 현재 폼 데이터에서 복원
                if (!this.jobres) {
                    const jrId = $('#jr_id').val();
                    if (!jrId) { Alert.alert('', '작업을 선택해주세요.'); return; }
                    this.jobres = { id: jrId, order_num: $('#order_num').val() };
                }
                const item = this.jobres;

                if (state === 'stopped') {
                    // 재가동
                    const _this = this;
                    Alert.confirm('재가동', '재가동 하시겠습니까?', function () {
                        const sendData = {
                            stop_date: CommonUtil.getYYYYMMDD(),
                            stopTime: CommonUtil.getHourMin(),
                            WorkOrderNumber: item.order_num || $('#order_num').val(),
                            jr_pk: $('#jr_id').val(),
                            Description: '',
                            Equipment_id: $('#equipment_id').val(),
                            StopCause_id: null,
                            spjangcd: _this.spjangcd || ''
                        };
                        AjaxUtil.postAsyncData(_this.baseUrl + '/stop_save', sendData, function (result) {
                            if (result.success) {
                                Notify.success(result.message || '재가동 되었습니다.');
                                _this.searchMainData();
                                _this.showBasicInfo($('#jr_id').val());
                            } else {
                                Alert.alert('재가동 실패', result.message || '');
                            }
                        });
                    });
                } else {
                    this._showStopPopup();
                }
            }

                        { binding: 'end_date', header: '중지 시간', width: 140, align: 'center' },

            /* ── 차수 그리드 초기화 (공용) ── */
            initChasuGrid() {
                const _this = this;
                this.chasuGrid = new wijmo.grid.FlexGrid('#chasu-grid', {
                    autoGenerateColumns: false,
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    isReadOnly: false,   // ★ 편집 허용
                    columns: [
                        { binding: 'chasu', header: '차수', width: 50, align: 'center', isReadOnly: true },
                        { binding: 'worker_name', header: '작업자', width: 90, align: 'center', isReadOnly: true },
                        { binding: 'state_name', header: '상태', width: 60, align: 'center', isReadOnly: true },
                        { binding: 'input_qty', header: '배정량', width: 60, format: 'n0', align: 'right', isReadOnly: true },
                        { binding: 'good_qty', header: '양품량', width: 70, format: 'n0', align: 'right' },     // 편집 가능
                        { binding: 'defect_qty', header: '부적합', width: 70, format: 'n0', align: 'right' },   // 편집 가능
                        { binding: 'start_time', header: '시작', width: 110, align: 'center', isReadOnly: true },
                        { binding: 'end_time', header: '종료', width: 110, align: 'center', isReadOnly: true },
                        { header: '작업', width: 120, align: 'center', cssClass: 'chasu-action', isReadOnly: true },
                    ],
                    // 완료된 행은 편집 불가 (working/ready만 수정)
                    beginningEdit: (s, e) => {
                        const item = s.rows[e.row].dataItem;
                        if (item && item.state === 'finished') {
                            e.cancel = true;   // 완료 차수는 수정 막음
                        }
                    },
                    itemFormatter: (panel, row, col, cell) => {
                        if (panel.cellType === wijmo.grid.CellType.Cell) {
                            const item = panel.rows[row].dataItem;
                            const column = panel.columns[col];
                            if (!item) return;
                            if (column.header === '작업') {
                                const st = item.state;
                                // ★ 키오스크/태블릿: 버튼이 셀을 꽉 채우는 풀셀 버튼
                                const touch = document.body.classList.contains('touch-mode')
                                    || document.body.classList.contains('mobile-mode');
                                const bs = touch
                                    ? 'display:block; width:100%; min-height:42px; padding:6px 8px; font-size:1.02rem; font-weight:600;'
                                    : 'padding:2px 10px; height:20px;';
                                if (st === 'ready' || st === 'assigned') {
                                    cell.innerHTML = `<button class="btn btn-chasu-start" data-id="${item.id}" style="${bs} background:#4caf50; color:#fff; border:none; border-radius:6px;">시작</button>`;
                                } else if (st === 'working') {
                                    cell.innerHTML = `<button class="btn btn-chasu-finish" data-id="${item.id}" style="${bs} background:#1976d2; color:#fff; border:none; border-radius:6px;">완료</button>`;
                                } else if (st === 'finished') {
                                    cell.innerHTML = `<button class="btn btn-chasu-cancel" data-id="${item.id}" style="${bs} background:#ff5722; color:#fff; border:none; border-radius:6px;">완료취소</button>`;
                                } else {
                                    cell.innerHTML = `<span style="color:#999;">-</span>`;
                                }
                            }
                        }
                    }
                });

                this.chasuGrid.hostElement.addEventListener('click', (e) => {
                    const startBtn = e.target.closest('.btn-chasu-start');
                    const finishBtn = e.target.closest('.btn-chasu-finish');
                    const cancelBtn = e.target.closest('.btn-chasu-cancel');
                    if (startBtn) {
                        e.stopPropagation();
                        _this.startChasu(parseInt(startBtn.dataset.id));
                    } else if (finishBtn) {
                        e.stopPropagation();
                        _this.finishChasu(parseInt(finishBtn.dataset.id));
                    } else if (cancelBtn) {
                        e.stopPropagation();
                        _this.cancelFinishChasu(parseInt(cancelBtn.dataset.id));
                    }
                });
            }

            /* ── 차수 작업자 드롭다운 채우기 (페이지 init에서 호출) ── */
            fillChasuWorkers() {
                const $sel = $('#chasuWorker');
                if ($sel.length === 0) return;
                // 첫 옵션(미지정) 유지하고 person 추가
                AjaxUtil.fillSelectOptions($sel, 'person', '', '', '');
                // '미지정(즉시생산)' 옵션을 맨 앞에 보장
                if ($sel.find('option[value=""]').length === 0) {
                    $sel.prepend('<option value="">미지정(즉시생산)</option>');
                }
                $sel.val('');
            }

            /* ── 차수 목록 ── */
            showChasuList(jr_pk) {
                if (!this.chasuGrid) return;
                const result = AjaxUtil.getSyncData(this.baseUrl + '/chasu_list', { jr_pk });
                if (result.data) {
                    this.chasuGrid.itemsSource = new wijmo.collections.CollectionView(result.data);
                    this.refreshAfterChasu(jr_pk);
                    // ★ 터치: 행 수에 맞춰 그리드 높이 조정
                    if ($('body').hasClass('touch-mode')) this.fitChasuGridHeight();
                }
            }

            /* ── 부적합 목록 ── */
            showDefectList(jr_pk) {
                if (!this.defectGrid) return;
                const workcenter_id = $('#workcenter_id').val();
                const result = AjaxUtil.getSyncData(this.baseUrl + '/defect_list', {
                    jr_pk, workcenter_id, type: 'total'
                });
                if (result.data) {
                    this.defectGrid.itemsSource = result.data;
                }
            }

            /* ── 투입 목록 ── */
            showConsumedList(jr_pk) {
                if (!this.consumedGrid) return;
                const consumed_mode = $('#consumed_mode').val();
                const param = {
                    jr_pk,
                    mat_pk: $('#mat_pk').val(),
                    process_id: $('#process_id').val(),
                    routing_id: $('#routing_id').val(),
                    prod_date: $('#prod_date').val(),
                    order_qty: $('#order_qty').val(),
                    consumed_mode,
                    prod_mat_id: $('#prod_mat_id').val(),
                    need_pro_mat_qty: $('#need_pro_mat_qty').val()
                };

                    this.consumedGrid.itemsSource = result.data;

            /* ── 투입 로트 목록 ── */
            showInputLotList(jr_pk) {
                if (!this.inputLotGrid) return;
                if (!jr_pk) jr_pk = $('#jr_id').val();
                const mat_code = $('#txtInputCode')?.val() || '';
                const result = AjaxUtil.getSyncData(this.baseUrl + '/input_lot_list', { jr_pk, mat_code });

                    this.inputLotGrid.itemsSource = new wijmo.collections.CollectionView(result.data);
