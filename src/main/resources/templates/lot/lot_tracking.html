<html layout:decorate="~{layout_page}">
<head>
  <style>
      .wj-header {
          text-align: center !important;
      }
      .lot-info-table th {
          width: 110px;
          white-space: nowrap;
      }
      .toggle-bar {
          display: flex;
          align-items: center;
          gap: 8px;
          margin: 6px 0;
          font-weight: 600;
      }
      /* 상단 검색+기본정보 컴팩트화 (스크롤 최소화) */
      .lot-top.section {
          padding-top: 8px;
          padding-bottom: 8px;
      }
      .lot-top .section-top {
          margin-bottom: 6px;
      }
      .lot-top caption {
          display: none;          /* 'LOT 기본정보' 캡션 숨김 */
      }
      .lot-top .lot-info-table {
          margin-bottom: 0;
      }
      .lot-top .lot-info-table th,
      .lot-top .lot-info-table td {
          padding-top: 3px;
          padding-bottom: 3px;
      }
      .lot-top .lot-info-table .form-control2 {
          height: 28px;
      }
  </style>
</head>

<th:block layout:fragment="content">
  <div class="layout-contents">
    <div class="page-title-wrap">
      <div class="left">
        <h2>LOT 트래킹</h2>
        <a title="북마크" class="bookmark toggle">
          내 메뉴
        </a>
      </div>
      <ul class="page-navi">
        <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>
        <li>품질관리</li>
        <li>LOT 트래킹</li>
      </ul>
    </div>

    <!-- 검색 + LOT 기본정보 -->
    <section class="section lot-top">
      <div class="section-top">
        <div class="search-wrap">
          <dl>
            <dt>
              <label>LOT번호</label>
            </dt>
            <dd>
              <div class="srch-box">
                <input type="text" class="form-control2" id="LotNumber" name="LotNumber"
                       placeholder="scan or 입력">
              </div>
            </dd>
          </dl>

          <dl>
            <dt><span class="eq"></span></dt>
            <dd>
              <li>
                <a class="btn btn-delete" title="검색" id="btnMainSearch">
                  <img th:src="@{/images/icon/btn-srch.svg}" alt="검색 아이콘">
                  검색
                </a>
              </li>
            </dd>
          </dl>

          <dl style="margin-left:auto;">
            <dt></dt>
            <dd>
              <h2 id="spanLotNumber" style="font-size: 15px;"></h2>
            </dd>
          </dl>
        </div>
      </div>
      <div>
        <form id="lotForm">
          <table class="write-table lot-info-table"
                 style="width: 100%; border-collapse: collapse; table-layout: fixed;">
            <caption style="text-align: left; margin-bottom: 8px;">LOT 기본정보</caption>
            <col class="wp10"><col class="wp15"><col class="wp10"><col class="wp15">
            <col class="wp10"><col class="wp15"><col class="wp10"><col class="wp15">
            <tbody>
            <tr>
              <th><label for="InputDateTime">LOT생성일</label></th>
              <td><input type="text" class="form-control2" id="InputDateTime" name="InputDateTime" readonly style="width:100%;"></td>
              <th><label for="InputQty">초기수량</label></th>
              <td><input type="text" class="form-control2" id="InputQty" name="InputQty" readonly style="width:100%;"></td>
              <th><label for="CurrentStock">현재고량</label></th>
              <td><input type="text" class="form-control2" id="CurrentStock" name="CurrentStock" readonly style="width:100%;"></td>
              <th><label for="unit_name">단위</label></th>
              <td><input type="text" class="form-control2" id="unit_name" name="unit_name" readonly style="width:100%;"></td>
            </tr>
            <tr>
              <th><label for="mat_type_name">품목구분</label></th>
              <td>
                <input type="hidden" id="mat_type" name="mat_type">
                <input type="text" class="form-control2" id="mat_type_name" name="mat_type_name" readonly style="width:100%;">
              </td>
              <th><label for="mat_group_name">품목그룹</label></th>
              <td><input type="text" class="form-control2" id="mat_group_name" name="mat_group_name" readonly style="width:100%;"></td>
              <th><label for="mat_name">품목명</label></th>
              <td><input type="text" class="form-control2" id="mat_name" name="mat_name" readonly style="width:100%;"></td>
              <th><label for="EffectiveDate">유효기간</label></th>
              <td><input type="text" class="form-control2" id="EffectiveDate" name="EffectiveDate" readonly style="width:100%;"></td>
            </tr>
            </tbody>
          </table>
        </form>
      </div>
    </section>

    <!-- 재료추적 -->
    <section class="section">
      <div class="toggle-bar">
        <label class="switch">
          <input type="checkbox" checked id="btnMaterialToggle"><span class="slider round"></span>
        </label>
        재료추적 보기/감추기
      </div>
      <div id="divMaterialTracking">
        <div class="tab-wrap">
          <ul class="tab-links">
            <li><a href="#tab_mat_tracking">재료추적</a></li>
            <li><a href="#tab_mat_inout">원재료입고정보</a></li>
          </ul>
          <div>
            <section class="tab-item" id="tab_mat_tracking" style="border-top-left-radius: 0;">
              <div class="container-fluid">
                <div id="mat-tracking-grid" style="height:200px;"></div>
              </div>
            </section>
            <section class="tab-item" id="tab_mat_inout" style="border-top-left-radius: 0;">
              <div class="container-fluid">
                <div id="mat-inout-grid" style="height:200px;"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>

    <!-- 제품추적 -->
    <section class="section">
      <div class="toggle-bar">
        <label class="switch">
          <input type="checkbox" checked id="btnProductToggle"><span class="slider round"></span>
        </label>
        제품추적 보기/감추기
      </div>
      <div id="divProductTracking">
        <div class="tab-wrap">
          <ul class="tab-links">
            <li><a href="#tab_product_tracking">제품추적</a></li>
            <li><a href="#tab_product_shipment">제품출하정보</a></li>
          </ul>
          <div>
            <section class="tab-item" id="tab_product_tracking" style="border-top-left-radius: 0;">
              <div class="container-fluid">
                <div id="product-tracking-grid" style="height:200px;"></div>
              </div>
            </section>
            <section class="tab-item" id="tab_product_shipment" style="border-top-left-radius: 0;">
              <div class="container-fluid">
                <div id="product-shipment-grid" style="height:200px;"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>
  </div>
</th:block>


<th:block layout:fragment="scripts">
  <script type="text/javascript">
   class LotTrackingPage {
    constructor() {
     this.url = '/api/lot/lot_tracking';
     this.matTrackingGrid = null;
     this.inoutGrid = null;
     this.productTrackingGrid = null;
     this.shipmentGrid = null;
     this.lot_detail = null;
    }

    init() {
     let _this = this;

     this.initMatTracking();
     this.initProductTracking();

     this.$spanLotNumber = $('#spanLotNumber');
     this.$LotNumber = $('#LotNumber');
     this.$lotForm = $('#lotForm');

     // 바코드 스캐너 / Tab 키 입력
     this.$LotNumber.keydown(function (e) {
      if (e.keyCode == 9) {
       _this.loadLotDetail();
      }
     });

     // Enter 입력
     this.$LotNumber.on('keypress', function (e) {
      if (e.keyCode === 13) {
       if (_this.$LotNumber.val() !== '') {
        _this.loadLotDetail();
       }
      }
     });

     // 검색버튼
     $('#btnMainSearch').click(function (e) {
      if (_this.$LotNumber.val() !== '') {
       _this.loadLotDetail();
      }
     });
    }

    // 평면 데이터를 Wijmo 트리(childItemsPath)용 계층 구조로 변환
    buildTree(flatData, parentKey, selfKey) {
     if (!flatData || flatData.length === 0) return [];

     let map = {};
     let roots = [];

     // 각 노드 복제 + items 초기화
     flatData.forEach(function (row) {
      let node = Object.assign({}, row);
      node.items = [];
      map[node[selfKey]] = node;
     });

     flatData.forEach(function (row) {
      let node = map[row[selfKey]];
      let pk = row[parentKey];
      if (pk && map[pk] && pk !== row[selfKey]) {
       map[pk].items.push(node);
      } else {
       roots.push(node);
      }
     });

     return roots;
    }

    // 재료추적, 원재료 입고정보
    initMatTracking() {
     // 재료추적 (트리)
     this.matTrackingGrid = new wijmo.grid.FlexGrid('#mat-tracking-grid', {
      autoGenerateColumns: false,
      isReadOnly: true,
      showMarquee: true,
      childItemsPath: 'items',
      columns: [
       { binding: 'mat_name', header: '품목(재료)', width: 250, align: 'left' },
       { binding: 'p_mat_name', header: '생산품', width: 250, align: 'left' },
       { binding: 'lot_number', header: '품목LOT(재료)', width: 250, align: 'left' },
       { binding: 'p_lot_number', header: '생산품LOT', width: 150, align: 'center' },
       { binding: 'unit_name', header: '단위', width: 80, align: 'center' },
       { binding: 'lot_consume_qty', header: 'LOT투입수량', width: 110, align: 'right', format: 'n0' },
       { binding: 'WorkOrderNumber', header: '작업지시번호', width: 130, align: 'center' }
      ]
     });
     this.matTrackingGrid.rowHeaders.columns.splice(0, 1);

     // 원재료 입고정보
     this.inoutGrid = new wijmo.grid.FlexGrid('#mat-inout-grid', {
      autoGenerateColumns: false,
      isReadOnly: true,
      showMarquee: true,
      columns: [
       { binding: 'lot_number', header: '품목LOT', width: 150, align: 'center' },
       { binding: 'mat_name', header: '품목', width: 250, align: 'left' },
       { binding: 'InoutDate', header: '입고일', width: 150, align: 'center' },
       { binding: 'InputQty', header: '입고량', width: 150, align: 'right', format: 'n0' },
       { binding: 'company_name', header: '매입처', width: 150, align: 'center' },
       { binding: 'EffectiveDate', header: '유효일자', width: 150, align: 'center' },
       { binding: 'input_type_name', header: '입고구분', width: 150, align: 'center' }
      ]
     });
     this.inoutGrid.rowHeaders.columns.splice(0, 1);
    }

    // 제품추적, 제품출하정보
    initProductTracking() {
     // 제품추적 (트리)
     this.productTrackingGrid = new wijmo.grid.FlexGrid('#product-tracking-grid', {
      autoGenerateColumns: false,
      isReadOnly: true,
      showMarquee: true,
      childItemsPath: 'items',
      columns: [
       { binding: 'mat_name', header: '생산품', width: 250, align: 'left' },
       { binding: 'p_mat_name', header: '품목(재료)', width: 250, align: 'left' },
       { binding: 'lot_number', header: '생산품LOT', width: 250, align: 'left' },
       { binding: 'p_lot_number', header: '재료LOT', width: 150, align: 'center' },
       { binding: 'unit_name', header: '단위', width: 80, align: 'center' },
       { binding: 'lot_consume_qty', header: 'LOT투입수량', width: 110, align: 'right', format: 'n0' },
       { binding: 'wo', header: '작업지시번호', width: 130, align: 'center' }
      ]
     });
     this.productTrackingGrid.rowHeaders.columns.splice(0, 1);

     // 제품출하정보
     this.shipmentGrid = new wijmo.grid.FlexGrid('#product-shipment-grid', {
      autoGenerateColumns: false,
      isReadOnly: true,
      showMarquee: true,
      columns: [
       { binding: 'lot_number', header: '품목LOT', width: 150, align: 'center' },
       { binding: 'mat_name', header: '품목', width: 250, align: 'left' },
       { binding: 'ShipDate', header: '출하일', width: 150, align: 'center' },
       { binding: 'company_name', header: '고객사', width: 150, align: 'left' },
       { binding: 'Qty', header: '출하량', width: 100, align: 'right', format: 'n0' },
       { binding: 'shipment_state', header: '출하상태', width: 150, align: 'center' }
      ]
     });
     this.shipmentGrid.rowHeaders.columns.splice(0, 1);
    }

    setGridData(grid, data) {
     grid.itemsSource = new wijmo.collections.CollectionView(data || []);
    }

    loadLotDetail() {
     let _this = this;
     let lot_number = this.$LotNumber.val();
     let data = { action: 'lot_detail', lot_number: lot_number };

     this.lot_detail = null;
     this.$lotForm[0].reset();

     // 그리드 초기화
     this.setGridData(this.matTrackingGrid, []);
     this.setGridData(this.inoutGrid, []);
     this.setGridData(this.productTrackingGrid, []);
     this.setGridData(this.shipmentGrid, []);

     let fnsuccess = function (result) {
      if (result.data.length > 0) {
       _this.lot_detail = result.data[0];
       FormUtil.BindDataForm(result.data[0], _this.$lotForm);
       _this.$spanLotNumber.text("LOT : " + _this.lot_detail.LotNumber);
       _this.loadHistory();
      } else {
       Alert.alert('LOT추적오류', '해당 LOT정보가 없습니다.');
      }
     };
     let fnfailure = function (req, status, error) {
     };
     AjaxUtil.getAsyncData(this.url + '/lot_detail', data, fnsuccess, fnfailure);
    }

    loadHistory() {
     let _this = this;
     let mat_type = this.lot_detail.mat_type;
     let lot_number = _this.lot_detail.LotNumber;

     let data = {
      action: 'lot_history',
      mat_type: mat_type,
      lot_number: lot_number
     };

     let fnsuccess = function (result) {
      if (result.success) {
       // 평면 데이터를 트리로 변환 후 바인딩
       let matTree = _this.buildTree(result.data.m_item, 'p_lot_number', 'lot_number');
       let prodTree = _this.buildTree(result.data.p_item, 'p_lot_number', 'lot_number');

       _this.setGridData(_this.matTrackingGrid, matTree);
       _this.setGridData(_this.productTrackingGrid, prodTree);

       _this.setGridData(_this.inoutGrid, result.data.inout_list);
       _this.setGridData(_this.shipmentGrid, result.data.shipment_list);

       // 트리 전체 펼치기
       _this.matTrackingGrid.collapseGroupsToLevel(99);
       _this.productTrackingGrid.collapseGroupsToLevel(99);
      }
     };

     AjaxUtil.getAsyncData(this.url + '/lot_history', data, fnsuccess);
    }
   }

   document.readyState === 'complete' ? init() : window.onload = init;

   function init() {
    let page = new LotTrackingPage();
    page.init();

    // 보기/감추기 토글
    $('#btnMaterialToggle').click(function (e) {
     $("#divMaterialTracking").toggle(300);
    });

    $('#btnProductToggle').click(function (e) {
     $("#divProductTracking").toggle(300);
    });
   }
  </script>
</th:block>
</html>
