<html layout:decorate="~{layout_page}">

<th:block layout:fragment="content">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
    <style>


        :root{--bg:#E9EEF1;--surface:#FFF;--surface-2:#F4F7F9;--ink:#15222B;--ink-2:#5A6B76;--line:#D8E0E5;
            --teal:#0E7C86;--teal-d:#0A5C64;--teal-bg:#E2F1F2;--green:#1E9D58;--green-bg:#E4F4EA;
            --amber:#C77A00;--amber-bg:#FBEFD8;--red:#C8483B;--red-bg:#F7E4E1;--r:18px;--tap:60px;
            --shadow:0 1px 0 rgba(21,34,43,.04),0 8px 24px -16px rgba(21,34,43,.28)}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        .ms-wash-root{font-family:"Pretendard","Noto Sans KR",-apple-system,sans-serif;color:var(--ink);font-size:17px;line-height:1.45;-webkit-font-smoothing:antialiased;flex:1 1 auto;min-height:0;height:var(--wash-h,100%);max-height:var(--wash-h,none);display:flex;flex-direction:column}
        /* 앱 높이: JS가 측정한 상단 오프셋만큼 빼서 화면 바닥까지 채움 */
        .ms-wash-root .app{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;background:var(--bg);border-radius:12px;overflow:hidden}
        .topbar{flex:0 0 auto;height:64px;display:flex;align-items:center;gap:14px;padding:0 20px;
            background:var(--surface);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
        .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em}
        .brand .dot{width:12px;height:12px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px var(--teal-bg)}
        .brand small{font-weight:600;color:var(--ink-2);margin-left:2px}
        .proc-chip{margin-left:4px;padding:6px 12px;border-radius:999px;background:var(--teal-bg);color:var(--teal-d);font-weight:800;font-size:14px}
        .spacer{flex:1}.clock{font-variant-numeric:tabular-nums;font-weight:700}
        .screen{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}.screen.hide{display:none}

        /* 큐 */
        .wrap{padding:22px 20px 28px;max-width:1180px;margin:0 auto;width:100%;overflow:auto;-webkit-overflow-scrolling:touch;flex:1 1 auto;min-height:0}
        .qhead{display:flex;align-items:baseline;gap:12px;margin:2px 2px 18px}
        .qhead h1{font-size:26px;font-weight:800;letter-spacing:-.03em;margin:0}
        .qhead .cnt{color:var(--ink-2);font-weight:700}
        .qfilter{display:flex;gap:8px;margin-left:auto}
        .qfilter button{min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line);
            background:var(--surface);color:var(--ink-2);font-weight:700;font-size:15px;cursor:pointer}
        .qfilter button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
        .searchbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 2px 18px;
            background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
        .searchbar .slab{font-weight:800;color:var(--ink-2);font-size:14px}
        .searchbar .tilde{font-weight:800;color:var(--ink-2)}
        .dinput{height:48px;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-size:16px;
            font-weight:700;color:var(--ink);background:var(--surface-2);font-variant-numeric:tabular-nums;min-width:160px}
        .sbtn{height:48px;padding:0 22px;border:none;border-radius:12px;background:var(--teal);color:#fff;
            font-weight:800;font-size:16px;cursor:pointer;margin-left:auto}
        .sbtn:active{background:var(--teal-d)}
        .qgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
        .wo{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;
            cursor:pointer;box-shadow:var(--shadow);transition:transform .12s ease;position:relative;overflow:hidden}
        .wo:active{transform:scale(.985)}
        .wo .edge{position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--line)}
        .wo[data-st="working"] .edge{background:var(--teal)}.wo[data-st="wait"] .edge{background:var(--amber)}.wo[data-st="done"] .edge{background:var(--green)}
        .wo .row1{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .wo .wono{font-weight:800;font-size:15px;color:var(--ink-2)}
        .chip{margin-left:auto;padding:5px 11px;border-radius:999px;font-size:13px;font-weight:800}
        .chip.working{background:var(--teal-bg);color:var(--teal-d)}.chip.wait{background:var(--amber-bg);color:var(--amber)}.chip.done{background:var(--green-bg);color:var(--green)}
        .wo .name{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.3;margin:2px 0 14px}
        .wo .meta{display:flex;gap:18px;align-items:flex-end}
        .wo .meta .blk{display:flex;flex-direction:column;gap:2px}
        .wo .meta .lab{font-size:12.5px;color:var(--ink-2);font-weight:700}
        .wo .meta .val{font-size:18px;font-weight:800}
        .wo .prog{margin-left:auto;text-align:right}
        .wo .bar{height:8px;width:120px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin-top:6px}
        .wo .bar>i{display:block;height:100%;background:var(--teal);border-radius:999px}

        /* 공통 상단바(B,C) */
        .topbar2{flex:0 0 auto;background:var(--surface);border-bottom:1px solid var(--line);
            padding:12px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);z-index:2}
        .back{width:48px;height:48px;border-radius:14px;border:1px solid var(--line);background:var(--surface-2);
            display:grid;place-items:center;cursor:pointer;font-size:22px;flex:0 0 auto}
        .back:active{background:var(--line)}
        .htitle{min-width:0;flex:1}
        .htitle .t{font-size:18px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .htitle .s{font-size:13.5px;color:var(--ink-2);font-weight:700;margin-top:1px}

        /* B. 세션 목록 */
        .col-stack{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;height:100%}
        .bscroll{flex:1 1 auto;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:18px}
        .bgrid{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
        .ovbox{display:flex;gap:12px;flex-wrap:wrap}
        .ov{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
            padding:14px 16px;box-shadow:var(--shadow)}
        .ov .l{font-size:13px;color:var(--ink-2);font-weight:700}
        .ov .v{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
        .ov.left .v{color:var(--teal-d)}
        .secline{display:flex;align-items:center;gap:10px;margin:6px 2px 0;color:var(--ink-2);font-weight:800;font-size:14px}
        .secline .ln{flex:1;height:1px;background:var(--line)}
        .sess{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;
            box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;
            transition:transform .12s ease}
        .sess:active{transform:scale(.99)}
        .sess .edge{position:absolute;left:0;top:0;bottom:0;width:5px}
        .sess[data-st="working"] .edge{background:var(--teal)}.sess[data-st="done"] .edge{background:var(--green)}
        .sess .who{display:flex;flex-direction:column;gap:2px;min-width:120px}
        .sess .who .nm{font-size:18px;font-weight:800}
        .sess .who .eq{font-size:13px;color:var(--ink-2);font-weight:700}
        .sess .time{font-size:13.5px;color:var(--ink-2);font-weight:700;font-variant-numeric:tabular-nums}
        .sess .qty{margin-left:auto;text-align:right}
        .sess .qty .v{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
        .sess .qty .l{font-size:12px;color:var(--ink-2);font-weight:700}
        .sess .badge{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:800}
        .sess .badge.working{background:var(--teal-bg);color:var(--teal-d)}.sess .badge.done{background:var(--green-bg);color:var(--green)}
        .sess .bad{padding:5px 10px;border-radius:999px;background:var(--red-bg);color:var(--red);font-weight:800;font-size:12.5px}
        .emptysess{text-align:center;color:var(--ink-2);font-weight:700;padding:30px;border:1.5px dashed var(--line);border-radius:var(--r)}

        /* C. 세션 작업(부품) */
        .infopill{display:flex;gap:7px;align-items:center;background:var(--surface-2);border:1px solid var(--line);
            border-radius:12px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--ink-2);cursor:default}
        .infopill.tap{cursor:pointer}.infopill.tap:active{background:var(--line)}
        .infopill b{color:var(--ink);font-variant-numeric:tabular-nums}
        .infopill.tap b{color:var(--teal-d);text-decoration:underline dotted}
        .sstate{padding:8px 14px;border-radius:999px;font-weight:800;font-size:14px}
        .sstate.working{background:var(--teal-bg);color:var(--teal-d)}.sstate.done{background:var(--green-bg);color:var(--green)}
        .part{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;
            display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);flex-wrap:wrap}
        .part.locked{opacity:.7}
        .part .id{display:flex;flex-direction:column;min-width:0;flex:1}
        .part .pn{font-size:18px;font-weight:800;letter-spacing:-.02em}
        .part .pc{font-size:13px;color:var(--ink-2);font-weight:700;font-variant-numeric:tabular-nums}
        .part .stat{display:flex;gap:20px;align-items:center;flex:0 0 auto}
        .part .col{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
        .part .col .l{font-size:12px;font-weight:700;color:var(--ink-2)}
        .part .col .v{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
        .part .col .v.left{color:var(--teal-d)}.part .col .v.bad{color:var(--red)}
        .stepper{display:flex;align-items:center;flex:0 0 auto}
        .stepper button{width:50px;height:54px;border:1px solid var(--line);background:var(--surface-2);font-size:25px;font-weight:700;cursor:pointer;display:grid;place-items:center}
        .stepper button:active{background:var(--line)}
        .stepper button.minus{border-radius:14px 0 0 14px}.stepper button.plus{border-radius:0 14px 14px 0}
        .stepper .qty{width:90px;height:54px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
            background:#FFFDF4;text-align:center;font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;display:grid;place-items:center;cursor:pointer}
        .defbtn{height:54px;padding:0 16px;border-radius:14px;border:1px solid var(--line);background:var(--surface);
            color:var(--ink-2);font-weight:800;font-size:14px;cursor:pointer;flex:0 0 auto}
        .defbtn:active{background:var(--surface-2)}.defbtn.has{background:var(--red-bg);color:var(--red);border-color:transparent}
        .done-tag{padding:7px 14px;border-radius:999px;background:var(--green-bg);color:var(--green);font-weight:800;font-size:14px}

        .actionbar{flex:0 0 auto;background:var(--surface);border-top:1px solid var(--line);
            padding:14px 18px calc(14px + env(safe-area-inset-bottom));display:flex;gap:12px;align-items:center;
            box-shadow:0 -8px 24px -18px rgba(21,34,43,.4)}
        .actionbar .actsum{display:flex;flex-direction:column;margin-right:auto}
        .actionbar .actsum .l{font-size:12.5px;color:var(--ink-2);font-weight:700}
        .actionbar .actsum .v{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
        .btn{min-height:var(--tap);padding:0 24px;border-radius:16px;border:none;cursor:pointer;font-size:18px;font-weight:800;display:inline-flex;align-items:center;gap:8px}
        .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}.btn.ghost:active{background:var(--line)}
        .btn.primary{background:var(--teal);color:#fff;padding:0 36px;box-shadow:0 8px 18px -8px rgba(14,124,134,.7)}.btn.primary:active{background:var(--teal-d)}
        .btn.start{background:var(--teal);color:#fff;flex:1;justify-content:center;font-size:20px}
        .btn.danger{background:var(--red-bg);color:var(--red)}

        /* 시트 */
        .mask{position:fixed;inset:0;background:rgba(21,34,43,.42);display:none;z-index:40;align-items:flex-end}
        .mask.show{display:flex;animation:fade .15s ease}@keyframes fade{from{opacity:0}to{opacity:1}}
        .sheet{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px calc(40px + env(safe-area-inset-bottom));
            box-shadow:0 -20px 40px -20px rgba(0,0,0,.4);animation:rise .2s cubic-bezier(.2,.7,.3,1);max-height:88dvh;overflow:auto}
        @keyframes rise{from{transform:translateY(40px)}to{transform:translateY(0)}}
        .sheet .sh{display:flex;align-items:center;margin-bottom:16px}
        .sheet .sh h3{font-size:20px;font-weight:800;margin:0;letter-spacing:-.02em}
        .sheet .sh .x{margin-left:auto;width:44px;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--surface-2);font-size:20px;cursor:pointer}
        .sheet .body{max-width:640px;margin:0 auto}
        .fieldlab{font-size:14px;font-weight:800;color:var(--ink-2);margin:14px 2px 8px}
        .opts{display:flex;flex-wrap:wrap;gap:10px}
        .opt{min-height:54px;padding:0 18px;border-radius:14px;border:1.5px solid var(--line);background:var(--surface);font-weight:800;font-size:16px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
        .opt:active{background:var(--surface-2)}.opt.sel{border-color:var(--teal);background:var(--teal-bg);color:var(--teal-d)}
        .opt .sub{font-size:12.5px;color:var(--ink-2);font-weight:700}
        .sheet .ok{width:100%;margin-top:20px;background:var(--teal);color:#fff;min-height:var(--tap);border:none;border-radius:16px;font-size:19px;font-weight:800;cursor:pointer}
        .sheet .ok:disabled{background:var(--line);color:var(--ink-2)}
        .pad .disp{margin-left:auto;min-width:140px;text-align:right;font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:8px 16px}
        .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px;margin:6px auto 0}
        .keys button{height:62px;border-radius:14px;border:1px solid var(--line);background:var(--surface);font-size:25px;font-weight:800;cursor:pointer;font-variant-numeric:tabular-nums}
        .keys button:active{background:var(--surface-2)}.keys button.ok{background:var(--teal);color:#fff;border-color:var(--teal)}.keys button.clr{color:var(--red)}
        .dateedit{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 10px}
        .dateedit .dbtn{width:56px;height:52px;border-radius:14px;border:1px solid var(--line);background:var(--surface-2);font-size:22px;font-weight:700;cursor:pointer}
        .dateedit .dbtn:active{background:var(--line)}
        .dateedit .dval{min-width:200px;text-align:center;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
        .timeedit{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 0}
        .tcol{display:flex;flex-direction:column;align-items:center;gap:8px}
        .tcol button{width:84px;height:52px;border-radius:14px;border:1px solid var(--line);background:var(--surface-2);font-size:24px;font-weight:700;cursor:pointer}
        .tcol .tv{font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;width:84px;text-align:center}
        .tsep{font-size:40px;font-weight:800;padding-bottom:4px}
        .photos{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
        .photo{width:84px;height:84px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}
        .photo-add{width:84px;height:84px;border-radius:12px;border:1.5px dashed var(--line);background:var(--surface-2);display:grid;place-items:center;cursor:pointer;color:var(--ink-2);font-size:13px;font-weight:800;text-align:center}
        .photo-wrap{position:relative}
        .photo-wrap .del{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;border:2px solid #fff;font-size:13px;cursor:pointer;line-height:1}
        @media (max-width:680px){.part .stat{order:3;width:100%;justify-content:space-between}.qgrid{grid-template-columns:1fr}.sess{flex-wrap:wrap}}
        @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}


        /* ── 멸균일지/그래프 ── */
        .ms-wash-root .log-step{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;background:var(--surface)}
        .ms-wash-root .log-step .h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .ms-wash-root .log-step .no{width:30px;height:30px;border-radius:8px;background:var(--teal-bg);color:var(--teal-d);font-weight:800;display:grid;place-items:center;font-size:14px}
        .ms-wash-root .log-step .nm{font-weight:800;font-size:16px}
        .ms-wash-root .log-step .crit{font-size:12.5px;color:var(--ink-2);font-weight:700;margin-left:auto;text-align:right;max-width:50%}
        .ms-wash-root .log-field{display:flex;align-items:center;gap:8px;margin-top:6px}
        .ms-wash-root .log-field label{font-size:13px;color:var(--ink-2);font-weight:700;min-width:84px}
        .ms-wash-root .log-field input{flex:1;height:44px;border:1px solid var(--line);border-radius:10px;padding:0 10px;font-size:15px;font-weight:700;background:var(--surface-2)}
        .ms-wash-root .upbox{border:1.5px dashed var(--teal);border-radius:14px;padding:18px;text-align:center;background:#F0FAFB;cursor:pointer}
        .ms-wash-root .upbox .ic{font-size:30px}
        .ms-wash-root .chartwrap{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
        .ms-wash-root .chart-svg{width:100%;height:200px;display:block}
        .ms-wash-root .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
        .ms-wash-root .legend{display:flex;gap:14px;font-size:12px;font-weight:700;color:var(--ink-2);flex-wrap:wrap}
        .ms-wash-root .legend i{display:inline-block;width:12px;height:3px;border-radius:2px;margin-right:4px;vertical-align:middle}

        /* ── 바코드/출력/품목 ── */
        .ms-wash-root .fam-badge{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:800;margin-left:6px}
        .ms-wash-root .fam-badge.bsc{background:#E2F1F2;color:#0A5C64}
        .ms-wash-root .fam-badge.mcell{background:#EEE7FA;color:#6B3FA0}
        .ms-wash-root .lotopt{min-height:72px;padding:18px 18px}      /* 터치 크게 */
        .ms-wash-root .lotopt .ln{font-size:18px}
        .ms-wash-root .lotopt.sel{box-shadow:0 0 0 3px var(--teal-bg)}
        .ms-wash-root .lotstep{display:flex;align-items:center;margin-left:auto}
        .ms-wash-root .lotstep button{width:48px;height:50px;border:1px solid var(--line);background:var(--surface-2);font-size:24px;font-weight:700;cursor:pointer}
        .ms-wash-root .lotstep button:first-child{border-radius:12px 0 0 12px}
        .ms-wash-root .lotstep button:last-child{border-radius:0 12px 12px 0}
        .ms-wash-root .lotstep .n{width:64px;height:50px;display:grid;place-items:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-weight:800;font-variant-numeric:tabular-nums;background:#FFFDF4}
        .ms-wash-root .bc{font-family:'Libre Barcode 128',monospace}
        .ms-wash-root .bc-card{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff;text-align:center}
        .ms-wash-root .bc-bars{height:64px;background:repeating-linear-gradient(90deg,#15222B 0 2px,#fff 2px 4px,#15222B 4px 5px,#fff 5px 9px,#15222B 9px 12px,#fff 12px 13px);border-radius:3px;margin-bottom:8px}
        .ms-wash-root .bc-data{font-size:13px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.02em}
        .ms-wash-root .bc-sub{font-size:12px;color:var(--ink-2);font-weight:700;margin-top:2px}
        .ms-wash-root .printrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
        .ms-wash-root .form-tbl{width:100%;border-collapse:collapse;font-size:13px}
        .ms-wash-root .form-tbl th,.ms-wash-root .form-tbl td{border:1px solid var(--line);padding:8px 10px;text-align:left}
        .ms-wash-root .form-tbl th{background:var(--surface-2);font-weight:800}
        @media print{ body *{visibility:hidden} #printArea,#printArea *{visibility:visible}
            #printArea{position:absolute;left:0;top:0;width:100%;padding:20px} .mask{display:none !important} }
        #printArea{display:none}

        /* ── 공정 공통 추가 ── */

        /* ── 높이 자동 맞쫐 ──
           root 윗변 위치(=상단 헤더 높이)를 실측하고, 페이지 푸터 높이를 빼서
           root 높이를 화면 바닥(푸터 위)까지 정확히 채운다.
           헤더/푸터 크기가 바뀜도 actionbar(시작/완료)가 푸터에 가리지 않음. */
        (function () {
            const root = document.querySelector('.ms-wash-root');
            if (!root) return;

            // 내부(같은 문서) 푸터: 흐름 형제 + fixed/sticky
            function localBelow() {
                let below = 0, node = root;
                while (node && node !== document.body) {
                    let sib = node.nextElementSibling;
                    while (sib) {
                        const r = sib.getBoundingClientRect();
                        if (r.height > 0 && getComputedStyle(sib).position !== 'fixed') below += r.height;
                        sib = sib.nextElementSibling;
                    }
                    node = node.parentElement;
                }
                let fx = 0;
                document.querySelectorAll('body *').forEach(el => {
                    if (root.contains(el)) return;
                    const cs = getComputedStyle(el);
                    if (cs.position !== 'fixed' && cs.position !== 'sticky') return;
                    const r = el.getBoundingClientRect();
                    if (r.height > 0 && r.height < innerHeight * 0.5 && r.bottom > innerHeight - 2) fx = Math.max(fx, r.height);
                });
                return Math.max(below, fx);
            }

            // 화면에서 실제로 사용 가능한 바닥(px, iframe 내부 좌표). 부모 푸터까지 고려.
            function availBottom() {
                let bottom = window.innerHeight;          // 기본: iframe 자체 높이
                try {
                    const fe = window.frameElement;       // 같은 출처일 때만 접근 가능
                    if (fe) {
                        const pWin = window.parent, pDoc = pWin.document;
                        const feTop = fe.getBoundingClientRect().top;   // 부모 좌표계 iframe 상단
                        // (1) 흐름상 iframe 뒤에 오는 형제(푸터) 높이 합
                        let flow = 0, node = fe;
                        while (node && node !== pDoc.body) {
                            let sib = node.nextElementSibling;
                            while (sib) {
                                const cs = pWin.getComputedStyle(sib), r = sib.getBoundingClientRect();
                                if (r.height > 0 && cs.position !== 'fixed' && cs.position !== 'absolute') flow += r.height;
                                sib = sib.nextElementSibling;
                            }
                            node = node.parentElement;
                        }
                        // (2) 부모 바닥에 걸친 푸터 바(fixed/sticky/absolute, 작은 높이만 인정)
                        let fx = 0;
                        pDoc.querySelectorAll('body *').forEach(el => {
                            if (el === fe || el.contains(fe)) return;
                            const cs = pWin.getComputedStyle(el);
                            if (cs.position !== 'fixed' && cs.position !== 'sticky' && cs.position !== 'absolute') return;
                            const r = el.getBoundingClientRect();
                            if (r.height > 0 && r.height <= 160 && r.top > feTop && r.bottom > pWin.innerHeight - 40)
                                fx = Math.max(fx, r.bottom - r.top);
                        });
                        const pFooter = Math.max(flow, fx);
                        // 부모 가용 바닥(부모 좌표) → iframe 내부 좌표로 환산
                        bottom = Math.min(bottom, (pWin.innerHeight - pFooter) - feTop);
                    }
                } catch (e) {/* 교차 출처: iframe 자체 높이로 폴백 */
                }
                return bottom;
            }

            function fit() {
                const top = root.getBoundingClientRect().top;
                const avail = availBottom() - top - localBelow();
                root.style.setProperty('--wash-h', Math.max(320, Math.floor(avail)) + 'px');
            }

            window.addEventListener('resize', fit);
            window.addEventListener('orientationchange', fit);
            try {
                window.parent.addEventListener('resize', fit);
            } catch (e) {
            }
            fit();
            requestAnimationFrame(fit);
            setTimeout(fit, 200);
            setTimeout(fit, 600);
            if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);

        function renderSessList() {

                '<div class="ov"><div class="l">완제품 포장</div><div class="v">' + packed + '</div></div>' +
                '<div class="ov left"><div class="l">잔여수량</div><div class="v">' + Math.max(0, o.plan - packed) + '</div></div>' +
                (o.fam === 'BSC' ? '<div class="ov"><div class="l">인박스 입수</div><div class="v">' + cap + '</div></div>' : '');
            document.getElementById('sessCnt').textContent = o.sessions.length + '건';

            box.innerHTML = o.sessions.map(function (se, i) {
                var _pv = packView(o, se.units || 0);
                var lab = o.fam === 'MCELL' ? ('박스 ' + se.outbox) : ('완제품 ' + (se.units || 0) + ' · 인박스 ' + _pv.inbox + ' · 아웃 ' + _pv.outbox);
                return '<div class="sess" data-st="' + se.st + '" data-i="' + i + '"><div class="edge"></div>' +
                    '<div class="who"><span class="nm">' + se.worker + '</span><span class="eq">' + se.equip + '</span></div>' +
                    '<div class="time">' + pill(se.start) + ' ~ ' + pill(se.end) + '</div>' +
                    '<div class="qty"><div class="l">완제품</div><div class="v">' + (o.fam === 'MCELL' ? se.outbox : (se.units || 0)) + '</div></div>' +
                    '<span class="badge ' + se.st + '">' + STLAB[se.st] + '</span></div>';

        document.getElementById('sessList').addEventListener('click', function (e) {
            var s = e.target.closest('.sess');

        function openSess(i) {
            curS = curO.sessions[i];

            document.getElementById('cName').textContent = curS.worker + ' · 외포장' + (curO.fam === 'MCELL' ? '(M-CELL 박스)' : '');

            renderCBody();
            renderCAction();

        function renderCHead() {
            document.getElementById('cHead').innerHTML =
                '<div class="infopill"><span>설비</span><b>' + curS.equip + '</b></div>' +
                '<div class="infopill tap" data-time="start"><span>시작</span><b>' + pill(curS.start) + '</b></div>' +
                '<div class="infopill tap" data-time="end"><span>종료</span><b>' + pill(curS.end) + '</b></div>' +
                '<span class="sstate ' + curS.st + '">' + STLAB[curS.st] + '</span>';
        }

        function renderCBody() {
            var locked = curS.st !== 'working';
            var o = curO;
            var html = '';
            if (o.fam === 'MCELL') {
                html += '<div class="secline">M-CELL 박스 포장 <span class="ln"></span><span>디바이스</span></div>';
                html += '<div class="part"><div class="id"><span class="pn">박스 포장수량</span><span class="pc">M-CELL 디바이스 박스 포장</span></div>' +
                    (locked ? '<span class="done-tag">' + curS.outbox + ' EA</span>' : '<div class="stepper" data-mbox="1"><button class="minus">−</button><div class="qty">' + curS.outbox + '</div><button class="plus">+</button></div>') + '</div>';
                html += labelButtons(html);
                document.getElementById('cBody').innerHTML = html + labelSection();
                return;
            }
            var pv = packView(o, curS.units);
            var pm = pkMeta(curS.pkLot);
            // ① 완제품 = PK + CK
            html += '<div class="secline">① 완제품 (PK + CK) <span class="ln"></span><span>완제품 1개 = PK1 + CK1</span></div>';
            html += '<div class="part"><div class="id"><span class="pn">완제품(PK) 로트</span><span class="pc">' + (pm ? pm.lot + ' · ' + pm.name + ' · 멸균필 ' + pm.qty : '미선택') + '</span></div>' +
                (locked ? '<span class="done-tag" style="background:var(--surface-2);color:var(--ink-2)">' + (curS.pkLot || '-') + '</span>' : '<button class="btn ghost" data-pickpk="1" style="min-height:54px">' + (curS.pkLot ? '변경' : '선택') + '</button>') + '</div>';
            html += '<div class="part"><div class="id"><span class="pn">완제품 수량</span><span class="pc">이 세션에서 포장할 완제품(키트) 총개수</span></div>' +
                (locked ? '<span class="done-tag">' + curS.units + ' EA</span>' : '<div class="stepper" data-units="1"><button class="minus">−</button><div class="qty" data-padunits="1">' + curS.units + '</div><button class="plus">+</button></div>') + '</div>';
            // ② 라벨 로트 스캔 (외부 인쇄물 → 자동 매핑)
            html += '<div class="secline">② 라벨 로트 스캔 <span class="ln"></span><span>인박스 라벨 1회 → PK·CK 자동매핑</span></div>';
            if (!curS.labelLot) {
                html += '<div class="auto-box"><div class="ic">📷</div><div style="flex:1"><div style="font-weight:800">인박스 라벨 바코드 스캔</div><div style="font-size:12.5px;color:var(--ink-2);font-weight:700">인박스 라벨엔 PK·CK 로트가 같이 있어, 1회 스캔으로 셋 다 매핑됩니다.</div></div>' +
                    (locked ? '' : '<button class="btn primary" id="scanIn" style="min-height:54px">스캔</button>') + '</div>';
            } else {
                html += '<table class="form-tbl"><tr><th>구분</th><th>시스템 로트(발번)</th><th>라벨 로트(스캔)</th></tr>' +
                    ['PK', 'CK', '인박스'].map(function (t) {
                        return '<tr><td>' + t + '</td><td>' + (curS.pkLot || '-') + '</td><td><b>' + curS.labelLot + '</b></td></tr>';
                    }).join('') + '</table>' +
                    (locked ? '' : '<div style="margin-top:6px"><button class="btn ghost" id="rescanIn">다시 스캔</button></div>');
            }
            // ③ 포장 계층 (자동 계산)
            html += '<div class="secline">③ 포장 계층 (자동) <span class="ln"></span><span>인박스 ' + pv.ic + '입 / 아웃박스 ' + pv.oc + '입</span></div>';
            html += '<div class="part"><div class="id"><span class="pn">인박스</span><span class="pc">완제품 ' + curS.units + ' ÷ ' + pv.ic + '입 = 인박스 ' + pv.inbox + (pv.loose ? ' + 낱개 ' + pv.loose : '') + '</span></div>' +
                '<span class="done-tag">' + pv.inbox + ' 박스</span></div>';
            html += '<div class="part"><div class="id"><span class="pn">아웃박스</span><span class="pc">인박스 ' + pv.inbox + ' ÷ ' + pv.oc + '입 = 아웃박스 ' + pv.outbox + (pv.inLoose ? ' + 인박스 잔여 ' + pv.inLoose : '') + '</span></div>' +
                '<span class="done-tag">' + pv.outbox + ' 박스</span></div>';
            document.getElementById('cBody').innerHTML = html + labelSection();
        }

        function labelSection() {
            var o = curO;
            if (o.fam === 'MCELL') {
                if (curS.outbox <= 0) return '';
                return '<div class="secline">라벨 출력 <span class="ln"></span><span>박스</span></div><div class="printrow"><button class="btn ghost" id="bcBoxM" style="flex:1;min-height:56px">📦 박스 라벨 (' + curS.outbox + '장)</button></div>';
            }
            if (!curS.pkLot || curS.units <= 0) return '';
            var pv = packView(o, curS.units);
            var scanNote = '<div class="part locked"><div class="id"><span class="pn">PK · CK · 인박스 라벨</span><span class="pc">외부(ERP/UDI) 인쇄물 — MES는 스캔으로 지정만, 출력 안 함</span></div><span class="done-tag" style="background:var(--surface-2);color:var(--ink-2)">스캔 지정</span></div>';
            var outBtn = pv.outbox > 0
                ? '<button class="btn primary" id="bcOut" style="flex:1;min-height:56px">🗳 아웃박스 바코드 출력 (' + pv.outbox + '장)</button>'
                : '<div class="emptysess" style="flex:1">아웃박스 1개를 채우려면 완제품 ' + (pv.ic * pv.oc) + '개 필요</div>';
            return '<div class="secline">라벨 <span class="ln"></span><span>아웃박스만 MES 출력</span></div>' + scanNote +
                '<div class="printrow">' + outBtn + '</div>';
        }

        function labelButtons() {
            return '';
        }

        function renderCAction() {
            var bar = document.getElementById('cAction');
            var o = curO;
            var packed = o.fam === 'MCELL' ? curS.outbox : curS.units;
            if (curS.st === 'done') {
                bar.innerHTML = '<div class="actsum"><span class="l">완제품 포장</span><span class="v">' + packed + ' EA</span></div><button class="btn danger" id="cCancel">완료취소</button>';
                document.getElementById('cCancel').onclick = function () {
                    curS.st = 'working';
                    curS.end = null;
                    renderCHead();
                    renderCBody();
                    renderCAction();
                    renderSessList();
                    flash('완료취소 (목업)');
                };
            } else {
                var ready = o.fam === 'MCELL' ? (curS.outbox > 0) : (curS.pkLot && curS.units > 0 && curS.labelLot);
                bar.innerHTML = '<div class="actsum"><span class="l">완제품 포장</span><span class="v">' + packed + ' EA</span></div>' +
                    '<button class="btn ghost" id="cDelete">삭제</button><button class="btn primary" id="cFinish" ' + (ready ? '' : 'disabled style="opacity:.5"') + '>외포장 완료</button>';
                document.getElementById('cFinish').onclick = function () {
                    if (!ready) {
                        flash('PK로트·완제품수량·라벨스캔이 필요합니다');
                        return;
                    }
                    curS.st = 'done';
                    curS.end = nowHM();
                    renderCHead();
                    renderCBody();
                    renderCAction();
                    renderSessList();
                    flash('외포장 완료 → 출하대기 (목업)');
                };
                document.getElementById('cDelete').onclick = function () {
                    curO.sessions.splice(curS._idx, 1);
                    renderSessList();
                    show('B');
                    flash('작업 삭제 (목업)');
                };
            }
        }

        document.getElementById('cBody').addEventListener('click', function (e) {
            function step(sel, key, max) {
                var st = e.target.closest('[data-' + sel + ']');
                if (st && (e.target.classList.contains('plus') || e.target.classList.contains('minus'))) {
                    var d = e.target.classList.contains('plus') ? 1 : -1;
                    curS[key] = Math.max(0, (max ? Math.min(max, curS[key] + d) : curS[key] + d));
                    renderCBody();
                    renderCAction();
                    renderSessList();
                    return true;
                }
                return false;
            }

            if (step('units', 'units')) return;
            if (step('mbox', 'outbox')) return;
            var padu = e.target.closest('[data-padunits]');
            if (padu) {
                openPadUnits();
                return;
            }
            var pp = e.target.closest('[data-pickpk]');
            if (pp) {
                openPk();
                return;
            }
            if (e.target.id === 'scanIn' || e.target.id === 'rescanIn') {
                openScan();
                return;
            }
            if (e.target.id === 'bcOut') {
                var pv = packView(curO, curS.units);
                var lot = curS.labelLot || curS.pkLot;
                var dt = (curS.start || '').slice(2, 10).replace(/-/g, '');
                openBarcode('아웃박스 바코드', [{
                    line: '(01)' + curO.gtin + '(10)' + lot + '(30)' + (pv.ic * pv.oc) + '(11)' + dt,
                    sub: curO.name + ' · 아웃박스(완제품 ' + (pv.ic * pv.oc) + ' EA) · 로트 ' + lot,
                    copies: pv.outbox
                }]);
                return;
            }
            if (e.target.id === 'bcBoxM') {
                openBarcode('M-CELL 박스 라벨', [{
                    line: '(01)' + curO.gtin + '(10)MC' + (curS.start || '').slice(0, 10).replace(/-/g, ''),
                    sub: curO.name,
                    copies: curS.outbox
                }]);
                return;
            }
        });
        document.getElementById('cHead').addEventListener('click', function (e) {
            var t = e.target.closest('[data-time]');
            if (t) openTime(t.dataset.time);
        });

        // 인박스 라벨 스캔(목업) → PK·CK·인박스 라벨로트 자동매핑
        function openScan() {
            var sample = curO.blood === '골수' ? 'BMJ' : 'BMH';
            sample += (curO.start || '260626').slice(2, 10).replace(/-/g, '') || '260626';
            var v = prompt('인박스 라벨 바코드 스캔 (예: (01)' + curO.gtin + '(10)' + sample + '(30)1(11)260626)\n라벨 로트만 입력해도 됩니다:', sample);
            if (v === null) return;
            v = ('' + v).trim();
            if (!v) {
                return;
            }
            var m = v.match(/\(10\)([^()]+)/);
            curS.labelLot = m ? m[1] : v;
            renderCBody();
            renderCAction();
            renderSessList();
            flash('라벨 로트 ' + curS.labelLot + ' → PK·CK·인박스 매핑 (목업)');
        }

        function openPk() {
            document.getElementById('lotTitle').textContent = '멸균필 완제품(PK) 로트 선택';
            document.getElementById('lotList').innerHTML = PK_READY.map(function (l) {
                return '<div class="lotopt ' + (l.lot === curS.pkLot ? 'sel' : '') + '" data-lot="' + l.lot + '"><div><span class="ln">' + l.lot + '</span><div class="meta" style="margin:0">' + l.name + ' · 멸균필 ' + l.qty + ' EA</div></div></div>';
            }).join('');
            document.getElementById('lotList').onclick = function (e) {
                var o = e.target.closest('[data-lot]');
                if (!o) return;
                curS.pkLot = o.dataset.lot;
                hideMask('lotMask');
                renderCBody();
                renderCAction();
                renderSessList();
            };
            showMask('lotMask');
        }

        var padVal = '';

        function openPadUnits() {
            padVal = String(curS.units || 0);
            document.getElementById('padLab').textContent = '완제품 수량';
            document.getElementById('padDisp').textContent = padVal;
            showMask('padMask');
        }

        document.querySelector('#padMask .keys').addEventListener('click', function (e) {
            var k = e.target.dataset.k;
            if (!k) return;
            if (k === 'C') padVal = ''; else if (k === 'OK') {
                curS.units = parseInt(padVal || '0', 10);
                hideMask('padMask');
                renderCBody();
                renderCAction();
                renderSessList();
                return;
            } else padVal = (padVal === '0' ? '' : padVal) + k;
            document.getElementById('padDisp').textContent = padVal || '0';
        });


        /* ── 시작 시트 ── */
        function showMask(id) {
            document.getElementById(id).classList.add('show');
        }

        function hideMask(id) {
            document.getElementById(id).classList.remove('show');
        }

        document.querySelectorAll('.mask').forEach(function (m) {
            m.addEventListener('click', function (e) {
                if (e.target === m || (e.target.closest && e.target.closest('[data-close]'))) m.classList.remove('show');
            });
        });

        let selW = null, selE = null;

        function openStart() {
            selW = null;
            selE = null;
            document.getElementById('workerOpts').innerHTML = WORKERS.map(function (w) {
                return '<button class="opt" data-w="' + w + '">' + w + '</button>';
            }).join('');
            document.getElementById('equipOpts').innerHTML = EQUIPS.map(function (e) {
                return '<button class="opt" data-e="' + e[0] + '">' + e[0] + ' <span class="sub">' + e[1] + '</span></button>';
            }).join('');
            var so = document.getElementById('startOk');
            so.disabled = true;
            if (typeof beforeStartSheet === 'function') beforeStartSheet();
            showMask('startMask');
        }

        document.getElementById('workerOpts').addEventListener('click', function (e) {
            var b = e.target.closest('[data-w]');
            if (!b) return;
            document.querySelectorAll('#workerOpts .opt').forEach(function (x) {
                x.classList.remove('sel');
            });
            b.classList.add('sel');
            selW = b.dataset.w;
            ckStart();
        });
        document.getElementById('equipOpts').addEventListener('click', function (e) {
            var b = e.target.closest('[data-e]');
            if (!b) return;
            document.querySelectorAll('#equipOpts .opt').forEach(function (x) {
                x.classList.remove('sel');
            });
            b.classList.add('sel');
            selE = b.dataset.e;
            ckStart();
        });

        function ckStart() {
            document.getElementById('startOk').disabled = !(selW && selE && (typeof startReady !== 'function' || startReady()));
        }

        window.ckStart = ckStart;
        document.getElementById('startOk').onclick = function () {
            var se = mkSess(selW, selE);
            curO.sessions.push(se);
            if (curO.st === 'wait') curO.st = 'working';
            hideMask('startMask');
            renderSessList();
            openSess(curO.sessions.length - 1);
            flash('작업 시작 · ' + selW + ' / ' + selE);
        };

        /* 토스트 */
        let tT;

        function flash(m) {
            var t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = 'position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:#15222B;color:#fff;padding:14px 22px;border-radius:14px;font-weight:700;z-index:60;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);transition:opacity .3s';
                document.body.appendChild(t);
            }
            t.textContent = m;
            t.style.opacity = '1';
            clearTimeout(tT);
            tT = setTimeout(function () {
                t.style.opacity = '0';
            }, 1700);
        }

        window.flash = flash;
        window.showMask = showMask;
        window.hideMask = hideMask;
        window.pill = pill;
        window.nowHM = nowHM;
        window.STLAB = STLAB;
        window.WD = WD;

        /* ── 바코드/출력 공통 ── */
        function bcCard(d) {
            return '<div class="bc-card"><div class="bc-bars"></div>' +
                '<div class="bc-data">' + d.line + '</div>' +
                (d.sub ? '<div class="bc-sub">' + d.sub + '</div>' : '') + '</div>';
        }

        window.openBarcode = function (title, labels) {
            document.getElementById('bcTitle').textContent = title;
            document.getElementById('bcList').innerHTML = labels.map(function (l) {
                return '<div style="margin-bottom:12px">' + bcCard(l) +
                    (l.copies > 1 ? '<div class="bc-sub" style="text-align:center">× ' + l.copies + '장 출력</div>' : '') + '</div>';
            }).join('');
            window.__printLabels = labels;
            showMask('bcMask');
        };
        document.getElementById('bcPrint').onclick = function () {
            var labels = window.__printLabels || [];
            var html = '';
            labels.forEach(function (l) {
                var n = l.copies || 1;
                for (var i = 0; i < n; i++) {
                    html += '<div style="border:1px solid #000;border-radius:6px;padding:12px;margin:6px;display:inline-block;width:220px;text-align:center;page-break-inside:avoid">' +
                        '<div style="height:54px;background:repeating-linear-gradient(90deg,#000 0 2px,#fff 2px 4px,#000 4px 5px,#fff 5px 9px,#000 9px 12px,#fff 12px 13px);border-radius:2px;margin-bottom:6px"></div>' +
                        '<div style="font-size:12px;font-weight:700">' + l.line + '</div>' + (l.sub ? '<div style="font-size:11px;color:#555">' + l.sub + '</div>' : '') + '</div>';
                }
            });
            var pa = document.getElementById('printArea');
            pa.innerHTML = '<h3 style="margin:0 0 10px">' + document.getElementById('bcTitle').textContent + '</h3>' + html;
            hideMask('bcMask');
            setTimeout(function () {
                window.print();
            }, 100);
        };
        window.openPrintForm = function (title, innerHtml) {
            var pa = document.getElementById('printArea');
            pa.innerHTML = '<h2 style="text-align:center;margin:0 0 14px">' + title + '</h2>' + innerHtml;
            setTimeout(function () {
                window.print();
            }, 100);
        };


        /* 시간 수정 */
        let timeWhich = 'start', editDate = new Date();

        function fmtD(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' (' + WD[d.getDay()] + ')';
        }

        function openTime(which) {
            timeWhich = which;
            document.getElementById('timeTitle').textContent = (which === 'start' ? '시작' : '종료') + ' 일시 수정';
            var saved = which === 'start' ? curS.start : curS.end;
            if (saved && saved.indexOf(' ') >= 0) {
                var a = saved.split(' ');
                editDate = new Date(a[0] + 'T' + a[1]);
            } else editDate = new Date();
            document.getElementById('tDate').textContent = fmtD(editDate);
            document.getElementById('tH').textContent = String(editDate.getHours()).padStart(2, '0');
            document.getElementById('tM').textContent = String(editDate.getMinutes()).padStart(2, '0');
            showMask('timeMask');
        }

        window.openTime = openTime;
        document.querySelector('#timeMask .dateedit').addEventListener('click', function (e) {
            var b = e.target.closest('[data-d]');
            if (!b) return;
            editDate.setDate(editDate.getDate() + (+b.dataset.d));
            document.getElementById('tDate').textContent = fmtD(editDate);
        });
        document.querySelector('#timeMask .timeedit').addEventListener('click', function (e) {
            var b = e.target.closest('[data-t]');
            if (!b) return;
            var H = document.getElementById('tH'), M = document.getElementById('tM');
            var h = +H.textContent, m = +M.textContent;
            if (b.dataset.t === 'h+') h = (h + 1) % 24;
            if (b.dataset.t === 'h-') h = (h + 23) % 24;
            if (b.dataset.t === 'm+') m = (m + 1) % 60;
            if (b.dataset.t === 'm-') m = (m + 59) % 60;
            H.textContent = String(h).padStart(2, '0');
            M.textContent = String(m).padStart(2, '0');
        });
        document.getElementById('timeOk').onclick = function () {
            var ds = editDate.getFullYear() + '-' + String(editDate.getMonth() + 1).padStart(2, '0') + '-' + String(editDate.getDate()).padStart(2, '0');
            var v = ds + ' ' + document.getElementById('tH').textContent + ':' + document.getElementById('tM').textContent;
            if (timeWhich === 'start') curS.start = v; else curS.end = v;
            hideMask('timeMask');
            renderCHead();
            renderSessList();
            flash((timeWhich === 'start' ? '시작' : '종료') + ' 저장 ' + pill(v));
        };


        renderQueue();
    </script>
</th:block>

</html>
