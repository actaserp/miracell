<html layout:decorate="~{layout_page}">

<head>
    <style>
        /* 기존 prod_result 수량 강조 클래스와 동일 */
        .background-blue {
            background-color: #dcf0f8 !important;
            font-weight: bold !important;
            text-align: right !important;
        }
        .background-order {
            background-color: #e8f5e9 !important;
            font-weight: bold !important;
            text-align: right !important;
        }
        .background-defect {
            background-color: #fce4ec !important;
            font-weight: bold !important;
            text-align: right !important;
        }

        /* ── 공정 화면 보강: 작업 버튼 크게 (키오스크/태블릿) ── */
        .work-action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .work-action-buttons .btn { min-width: 70px; }
        #btnWorkStart  { background: #4caf50 !important; color: #fff !important; }
        #btnWorkFinish { background: #1976d2 !important; color: #fff !important; }
        #btnWorkStop   { background: #ff9800 !important; color: #fff !important; }

        /* ── 그리드 행 상태별 색 ── */
        .row-working  { background: #e8f5e9 !important; }
        .row-finished { background: #e3f2fd !important; }
        .row-stopped  { background: #fce4ec !important; }
        .row-locked   { color: #bbb !important; }

        /* ════════ 반응형: touch-mode(1600 밑) 기반 ════════ */
        /* 평소(PC): '목록' 탭 숨김 */
        .tab-links li:has(a[name="tabList"]) { display: none; }

        /* touch-mode: 좌우 2단 → 단일 컬럼, 목록을 탭으로 */
        body.touch-mode .prod-flex { flex-direction: column !important; }
        body.touch-mode .prod-flex > .section { display: none; }
        body.touch-mode .prod-flex > .tab-wrap { width: 100% !important; flex: none !important; }
        body.touch-mode .tab-links li:has(a[name="tabList"]) { display: list-item; }
        body.touch-mode #tabList #proc-main-grid { height: calc(100vh - 240px) !important; }

        /* touch-mode: 글자·버튼 확대 */
        body.touch-mode .tab-links a { font-size: 1.15rem !important; padding: 14px 20px !important; }
        body.touch-mode .wj-flexgrid .wj-header { font-size: 1.05rem !important; }
        body.touch-mode .wj-flexgrid .wj-cell { font-size: 1.05rem !important; padding: 10px !important; }
        body.touch-mode .work-table th,
        body.touch-mode .work-table td { font-size: 1.05rem !important; }
        body.touch-mode .work-table input,
        body.touch-mode .work-table select,
        body.touch-mode .work-table textarea { font-size: 1.05rem !important; min-height: 42px !important; }
        body.touch-mode .work-action-buttons .btn { font-size: 1.1rem !important; min-height: 48px !important; min-width: 90px !important; }
        /* PC: 목록 탭 콘텐츠 자체를 강제 숨김 (빈 박스 방지) */
        body:not(.touch-mode) #tabList { display: none !important; }
        /* ════════ 검사 탭 ════════ */
        #tabInspect .res-btn { border:none; border-radius:8px; padding:10px 18px; font-weight:700; cursor:pointer; min-width:74px; font-size:1rem; }
        #tabInspect .res-btn.pass { background:#e8f5e9; color:#2e7d32; }
        #tabInspect .res-btn.fail { background:#ffebee; color:#c62828; }
        #tabInspect tr.failrow { background:#fff5f5; }
        #tabInspect .insp-scroll { max-height:48vh; overflow:auto; }
        #tabInspect .insp-summary { display:flex; gap:16px; align-items:center; margin-left:auto; }
        #tabInspect .insp-summary b { font-size:1.2rem; }
        #tabInspect .pass { color:#2e7d32; } #tabInspect .fail { color:#c62828; }
        #tabInspect .muted { color:#90a4ae; font-size:.85rem; }
        /* 헤더(라벨 위, 겹침 방지) */
        #tabInspect .insp-head-grid { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px 18px; align-items:end; }
        #tabInspect .insp-head-grid .hf.full { grid-column:1 / -1; }
        #tabInspect .hf { display:flex; flex-direction:column; gap:4px; font-size:.82rem; color:#607d8b; min-width:0; }
        #tabInspect .hf select, #tabInspect .hf input { height:40px; width:100%; box-sizing:border-box; border:1px solid #cfd8dc; border-radius:6px; padding:0 10px; }
        body.touch-mode #tabInspect .insp-head-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
        /* 진행 툴바 */
        #tabInspect .insp-toolbar { display:flex; gap:14px 22px; align-items:flex-end; flex-wrap:wrap; padding:10px 12px; border-bottom:1px solid #eee; }
        #tabInspect .insp-progress { margin-left:auto; font-size:1rem; }
        #tabInspect .insp-progress b { font-size:1.2rem; }
        /* 현재 회차 카드 */
        #tabInspect .insp-active { padding:14px; background:#f1f8ff; border-top:2px solid #1976d2; }
        #tabInspect .ac-title { font-size:1.05rem; margin-bottom:10px; }
        #tabInspect .ac-fields { display:flex; gap:12px 18px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px; }
        #tabInspect .ac-fields input { height:40px; border:1px solid #cfd8dc; border-radius:6px; padding:0 10px; }
        #tabInspect .ac-btns { display:flex; gap:14px; }
        #tabInspect .res-btn.big { min-width:160px; min-height:56px; font-size:1.2rem; }
        #tabInspect .res-tag { padding:4px 12px; border-radius:6px; font-weight:700; }
        #tabInspect .res-tag.pass { background:#e8f5e9; color:#2e7d32; }
        #tabInspect .res-tag.fail { background:#ffebee; color:#c62828; }
        #tabInspect .btn-mini { border:1px solid #cfd8dc; background:#fff; border-radius:6px; padding:4px 10px; cursor:pointer; }
        #tabInspect .insp-complete { padding:18px; text-align:center; color:#2e7d32; font-size:1.1rem; font-weight:600; }
        /* 베이스 grid_box(절대배치 그리드 패널) 회피용 자체 박스 */
        #tabInspect .insp-box { position:static; background:#fff; border:1px solid #e8edf2; border-radius:8px; margin:0 0 12px; overflow:visible; }
        #tabInspect .insp-secttitle { padding:10px 14px; font-weight:600; color:#37474f; border-bottom:1px solid #eef1f5; }
        #tabInspect .insp-head-wrap { padding:12px 14px; }
        body.touch-mode #tabInspect .res-btn.big { min-width:220px; min-height:66px; font-size:1.35rem; }
        body.touch-mode #tabInspect .ac-fields input, body.touch-mode #tabInspect .hf input, body.touch-mode #tabInspect .hf select { min-height:48px; font-size:1.08rem; }
        /* 태블릿(touch-mode) = 실제 입력자용 → 탭 타깃 크게 */
        body.touch-mode #tabInspect .res-btn { min-width:100px; min-height:54px; font-size:1.2rem; }
        body.touch-mode #tabInspect .work-table th,
        body.touch-mode #tabInspect .work-table td { font-size:1.05rem; padding:12px 10px; }
        body.touch-mode #tabInspect input[type=text],
        body.touch-mode #tabInspect select { min-height:46px; font-size:1.05rem; }
        body.touch-mode #tabInspect .insp-scroll { max-height:60vh; }
    </style>
    <th:block th:replace="fragments/prod_process_common :: processCommonCss"></th:block>
</head>

<th:block layout:fragment="content">
    <div class="layout-contents">

        <!-- 페이지 타이틀 -->
        <div class="page-title-wrap">
            <div class="left">
                <h2 data-layout-toggle-anchor id="pageTitle">검사 실적</h2>
                <a title="북마크" class="bookmark toggle">내 메뉴</a>
            </div>
            <ul class="page-navi">
                <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>
                <li>공정 실적 관리</li>
                <li id="navProcessName">검사</li>
            </ul>
        </div>

        <div style="display: flex; gap: 5px;" class="prod-flex">

            <!-- ═══ 좌측: 작업 목록 ═══ -->
            <section class="section" style="flex: 1;">
                <div class="section-top" style="justify-content: left; gap: 15px;">
                    <div class="search-wrap">
                        <dl>
                            <dt>생산일<span class="eq">*</span></dt>
                            <dd>
                                <ul class="date-box">
                                    <li>
                                        <input type="date" id="date_from" name="date_from">
                                        <label for="date_from" class="hide">시작일</label>
                                    </li>
                                    <li>
                                        <input type="date" id="date_to" name="date_to">
                                        <label for="date_to" class="hide">종료일</label>
                                    </li>
                                </ul>
                            </dd>
                        </dl>
                        <dl id="searchItemArea">
                            <dt>품목</dt>
                            <dd>
                                <input type="text" style="width: 160px;"
                                       id="ItemSearch" name="ItemSearch" placeholder="품목코드 / 품목명">
                            </dd>
                        </dl>
                    </div>
                    <div class="search-wrap">
                        <dl>
                            <dd>
                                <div class="srch-box">
                                    <input type="checkbox" id="chxCompYn" name="chxCompYn" checked/>
                                    완료 포함
                                </div>
                            </dd>
                        </dl>
                        <dl>
                            <dd>
                                <li>
                                    <a class="btn btn-search" title="검색" id="btnMainSearch">
                                        <img th:src="@{/images/icon/btn-srch.svg}" alt="검색 아이콘">
                                        검색
                                    </a>
                                </li>
                            </dd>
                        </dl>
                    </div>
                </div>

                <div class="container-fluid">
                    <div id="proc-main-grid"></div>
                    <div id="proc-card-list"></div>
                </div>
            </section>

            <!-- ═══ 우측: 상세 ═══ -->
            <div class="tab-wrap" style="flex: 1; min-width: 0;">

                <ul class="tab-links">
                    <li><a href="#tabList" name="tabList">목록</a></li>
                    <li><a href="#tabBasic" name="tabBasic">기본 정보</a></li>
                    <li><a href="#tabConsumed" name="tabConsumed">투입 내역</a></li>
                    <li><a href="#tabChasu" name="tabChasu">차수별 생산</a></li>
                    <li><a href="#tabDefect" name="tabDefect">부적합 정보</a></li>
                    <li><a href="#tabInspect" name="tabInspect">검사</a></li>
                </ul>

                <div>

                    <!-- ──── 목록 (태블릿/키오스크 전용) ──── -->
                    <section class="tab-item" id="tabList" style="border-top-left-radius: 0;">
                        <!-- 좌측 목록(.section)이 이 안으로 이동됨 -->
                    </section>

                    <!-- ──── 기본정보 ──── -->
                    <section class="tab-item" id="tabBasic" style="border-top-left-radius: 0;">
                        <div class="section-top">
                            <div class="button-wrap work-action-buttons">
                                <ul style="display:flex; gap:6px; list-style:none; padding:0; margin:0; flex-wrap:wrap;">
                                    <li><button class="btn" title="시작" disabled id="btnWorkStart">시작</button></li>
                                    <li><button class="btn" title="중지" disabled id="btnWorkStop">일시중지</button></li>
                                    <li><button class="btn" title="완료" disabled id="btnWorkFinish">완료</button></li>
                                    <li><button class="btn" title="완료 취소" disabled id="btnFinishCancel">완료 취소</button></li>
                                    <li><button class="btn" title="저장" disabled id="btnSave"><i class="fas fa-save"></i></button></li>
                                    <li><button class="btn" title="삭제" disabled id="btnDel"><i class="fas fa-trash"></i></button></li>
                                </ul>
                            </div>

                            <div class="table-wrap">
                                <form id="basicForm">
                                    <input type="hidden" id="jr_id" name="id"/>
                                    <input type="hidden" id="parent_jr_pk" name="parent_jr_pk"/>
                                    <input type="hidden" id="routing_id" name="routing_id"/>
                                    <input type="hidden" id="workcenter_id" name="workcenter_id"/>
                                    <input type="hidden" id="wcfactory_id" name="wcfactory_id"/>
                                    <input type="hidden" id="mat_pk" name="mat_pk"/>
                                    <input type="hidden" id="prod_mat_id" name="prod_mat_id"/>
                                    <input type="hidden" id="prod_mat_nm" name="prod_mat_nm"/>
                                    <input type="hidden" id="need_pro_mat_qty" name="need_pro_mat_qty"/>
                                    <input type="hidden" id="consumed_mode" name="consumed_mode" value="ACTUAL"/>
                                    <input type="hidden" id="state" name="state"/>
                                    <input type="hidden" id="process_code" name="process_code" value="p03"/>

                                    <table class="work-table">
                                        <caption>작업 지시 테이블</caption>
                                        <colgroup>
                                            <col style="width: 20%;">
                                            <col style="width: 30%;">
                                            <col style="width: 20%;">
                                            <col style="width: 30%;">
                                        </colgroup>
                                        <tbody>
                                        <tr>
                                            <th><label for="order_num">작지번호</label></th>
                                            <td><input type="text" id="order_num" name="order_num" readonly/></td>
                                            <th><label for="mat_code">제품코드</label></th>
                                            <td><input type="text" id="mat_code" name="mat_code" readonly/></td>
                                        </tr>
                                        <tr>
                                            <th><label for="mat_name">제품</label></th>
                                            <td><input type="text" id="mat_name" name="mat_name" style="width: 200px;" readonly/></td>
                                            <th><label for="unit">단위</label></th>
                                            <td><input type="text" id="unit" name="unit" readonly/></td>
                                        </tr>
                                        <tr>
                                            <th><label for="job_state">상태</label></th>
                                            <td><input type="text" id="job_state" name="job_state" readonly/></td>
                                            <th><label for="process_name">공정</label></th>
                                            <td><input type="text" id="process_name" name="process_name" readonly
                                                       value="검사" style="font-weight:bold;"/></td>
                                        </tr>
                                        <tr>
                                            <th><label for="workcenter_name">워크센터</label></th>
                                            <td><input id="workcenter_name" name="workcenter_name" readonly style="width: 160px"/></td>
                                            <th><label for="equipment_id">설비</label></th>
                                            <td><select id="equipment_id" name="equipment_id" disabled></select></td>
                                        </tr>
                                        <tr>
                                            <th><label for="manager_id">관리자</label></th>
                                            <td colspan="3"><select id="manager_id" name="manager_id" disabled></select></td>
                                        </tr>
                                        <tr>
                                            <th><label for="prod_date">생산 시작시간</label></th>
                                            <td colspan="3">
                                                <div class="input-group" id="prod_datepicker">
                                                    <input type="date" id="prod_date" name="prod_date"
                                                           style="background-color: #EDEFF5;margin-right: 5px;" readonly/>
                                                    <input type="time" id="start_time" name="start_time" readonly/>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th><label for="end_date">생산 종료시간</label></th>
                                            <td colspan="3">
                                                <div class="input-group" id="prod_datepicker1">
                                                    <input type="date" id="end_date" name="end_date"
                                                           style="background-color: #EDEFF5; margin-right: 5px;" readonly/>
                                                    <input type="time" id="end_time" name="end_time" readonly/>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <th><label for="order_qty">지시량</label></th>
                                            <td colspan="3"><input type="number" id="order_qty" name="order_qty"
                                                                   class="background-order" readonly/></td>
                                        </tr>
                                        <tr>
                                            <th><label for="good_qty">양품량</label></th>
                                            <td><input type="number" id="good_qty" name="good_qty"
                                                       class="background-blue" readonly disabled/></td>
                                            <th><label for="defect_qty">부적합량</label></th>
                                            <td><input type="number" id="defect_qty" name="defect_qty"
                                                       class="background-defect" value="0" readonly/></td>
                                        </tr>
                                        <tr>
                                            <th><label for="description">비고</label></th>
                                            <td colspan="3">
                                                <textarea id="description" name="description" style="height:60px;" disabled></textarea>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </form>
                            </div>
                            <!-- 공정별 확장 영역 -->
                            <div id="processExtension">
                                <!-- p03 검사 확장 영역: 50회 구동 체크리스트, 불량 사진 업로드·Q-Point (추후 추가) -->
                            </div>
                        </div>
                    </section>

                    <!-- ──── 투입 내역 ──── -->
                    <section class="tab-item" id="tabConsumed" style="border-top-left-radius: 0;">
                        <div class="grid_box">
                            <div class="title_box">투입 계획</div>
                            <div class="container-fluid">
                                <div id="consumed-grid" style="height: 20vh;"></div>
                            </div>
                        </div>
                        <div>
                            <label class="switch">
                                <input type="checkbox" id="btnToggle"><span class="slider round"></span>
                            </label> 투입로트 보기/감추기
                        </div>
                        <div>&nbsp;</div>
                        <div class="grid_box" id="input_lot_div">
                            <div class="button-wrap">
                                <ul>
                                    <li><button type="button" class="btn" id="btnInputLotList" title="조회"><i class="fas fa-search"></i></button></li>
                                    <li><button type="button" class="btn" id="btnInputLotSelect" title="로트검색"><i class="fas fa-plus"></i></button></li>
                                    <li><button type="button" class="btn" id="btnLotSelectDel" title="로트삭제"><i class="fas fa-trash"></i></button></li>
                                    <li>로트번호 <input type="text" id="txtInputLot" class="w-200 tac" placeholder="로트번호를 스캔하세요" autocomplete="off" style="height: 36px;"/></li>
                                    <li><button type="button" class="btn" id="btnInputLotSave" title="로트투입 저장"><i class="fas fa-edit"></i></button></li>
                                    <li>품목코드 필터 : <input type="text" id="txtInputCode" placeholder="계획 선택" autocomplete="off" style="width:100px; height: 36px;"/></li>
                                </ul>
                            </div>
                            <div class="container-fluid">
                                <div id="input-lot-grid" style="height: 20vh;"></div>
                            </div>
                        </div>
                    </section>

                    <!-- ──── 차수별 생산 ──── -->
                    <section class="tab-item" id="tabChasu" style="border-top-left-radius: 0;">
                        <div class="grid_box">
                            <!-- 배정 입력 영역 -->
                            <div class="button-wrap" style="padding:8px; background:#fafafa; border-radius:6px;">
                                <ul style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; list-style:none; padding:0; margin:0;">
                                    <li>지시량 <strong id="ordqty">0</strong></li>
                                    <li style="color:#999;">|</li>
                                    <li>잔여 <strong id="remainQty" style="color:#1976d2;">0</strong></li>
                                    <li style="color:#999;">|</li>
                                    <li>
                                        작업자
                                        <select id="chasuWorker" style="width:120px;">
                                            <option value="">미지정(즉시생산)</option>
                                        </select>
                                    </li>
                                    <li>
                                        수량
                                        <input type="number" class="w-80" id="chasuQty" value="0" min="0" style="width:80px;">
                                    </li>
                                    <li><button type="button" class="btn" id="btnAddChasu" title="차수 추가" disabled><i class="fas fa-plus"></i> 추가</button></li>
                                    <li><button type="button" class="btn" id="btnDeleteChasu" title="마지막 차수 삭제" disabled><i class="fas fa-trash"></i></button></li>
                                    <li><button type="button" class="btn" id="btnLOTbarcode" title="LOT 바코드 출력" disabled><i class="fas fa-barcode"></i> LOT 바코드</button></li>
                                </ul>
                            </div>
                            <div class="content-wrap" style="margin-top:8px;">
                                <div>
                                    <div id="chasu-grid" style="height: 200px;"></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- ──── 부적합 정보 ──── -->
                    <section class="tab-item" id="tabDefect" style="border-top-left-radius: 0;">
                        <div class="grid_box">
                            <div class="button-wrap">
                                <ul>
                                    <li><button type="button" class="btn" id="btnDefectSave" title="부적합내역 저장" disabled><i class="fas fa-save"></i></button></li>
                                </ul>
                            </div>
                            <div class="container-fluid">
                                <div id="defect-grid" style="height: 220px;"></div>
                            </div>
                        </div>
                    </section>

                    <!-- ──── 검사 (체크리스트) ──── -->
                    <section class="tab-item" id="tabInspect" style="border-top-left-radius: 0;">
                        <div class="insp-box">
                            <div class="insp-secttitle">검사 — 대상 LOT</div>
                            <div class="insp-head-wrap">
                                <div class="insp-head-grid">
                                    <label class="hf">검사양식<select id="inspTplSel"></select></label>
                                    <label class="hf">대상 LOT<input type="text" id="inspLot" placeholder="로트번호 스캔" autocomplete="off"></label>
                                    <label class="hf">검사자<input type="text" id="inspWorker"></label>
                                    <label class="hf">검사일<input type="date" id="inspDate"></label>
                                    <label class="hf full">제품 <strong id="inspProd" class="muted">작업을 선택하세요</strong></label>
                                </div>
                            </div>
                        </div>
                        <div id="inspTplArea"></div>
                        <div class="insp-box">
                            <div class="button-wrap" style="padding:10px; display:flex; justify-content:flex-end; align-items:center; gap:14px;">
                                <span id="inspSaveHint" class="muted"></span>
                                <ul style="list-style:none; padding:0; margin:0;">
                                    <li><button type="button" class="btn" id="btnInspSave"><i class="fas fa-save"></i> 검사 저장</button></li>
                                </ul>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- 팝업 -->
    <th:block th:replace="/common/popup_consu_material :: materialSearchTemplate"></th:block>
    <th:block th:replace="/common/popup_consu_mat_lot :: matLotSearchTemplate"></th:block>
    <th:block th:replace="/common/popup_lot_input :: LotInputTemplate"></th:block>

    <script th:inline="javascript">
        const factory_id = [[${session.factory_id}]];
        const userid     = [[${session.userid}]];
        const username   = [[${session.username}]];   // 검사자 표시용(이름)
        const GUI_CODE   = 'prod_process_inspect';   // 고정값 (공정별 분리)
    </script>

    <th:block th:replace="fragments/prod_process_common :: processCommonJS"></th:block>

    <script type="text/javascript">
        // 공정별 설정 — 이 파일은 검사(p03) 전용
        const PROCESS_CONFIG = {
            'p03': { name: '검사' },
        };

        const MENUCODE_TO_PROCESS = {
            'prod_process_inspect': 'p03',
        };
        const PROCESS_CODE = 'p03';

        class ProcInspectPage extends ProcPageBase {
            constructor(processCode) {
                super(processCode);
                this.config = PROCESS_CONFIG[processCode] || { name: processCode };
                this.applyTheme();
                this.init();
            }

            applyTheme() {
                const nm = this.config.name;
                $('#pageTitle').text(nm + ' 실적');
                $('#navProcessName').text(nm);
                $('#process_name').val(nm);
                $('#process_code').val(this.processCode);
            }

            init() {
                AjaxUtil.fillSelectOptions($('#Factory_id'), 'factory', 'all', false);
                this.initMainGrid();
                this.initChasuGrid();
                this.initDefectGrid();
                this.initConsumedGrid();
                this.initInputLotGrid();
                this.initTabs();
                this.bindEvents();
                this.initInspectTab();
                this.fillChasuWorkers();
                this.searchMainData();
                this.initLayoutCollapse();
            }

            initDefectGrid() {
                this.defectGrid = new wijmo.grid.FlexGrid('#defect-grid', {
                    autoGenerateColumns: false,
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    isReadOnly: false,
                    columns: [
                        { binding: 'defect_type', header: '부적합유형', width: '*', align: 'left', isReadOnly: true },
                        { binding: 'defect_qty',  header: '부적합량',   width: 100, format: 'n0', align: 'right' },
                    ]
                });
            }

            initConsumedGrid() {
                this.consumedGrid = new wijmo.grid.FlexGrid('#consumed-grid', {
                    autoGenerateColumns: false,
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    isReadOnly: true,
                    headersVisibility: wijmo.grid.HeadersVisibility.Column,
                    allowSorting: true,
                    formatItem: (s, e) => {
                        if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader)
                            e.cell.style.textAlign = 'center';
                    },
                    columns: [
                        { binding: 'mat_code',        header: '품목코드',    width: 100, align: 'left' },
                        { binding: 'mat_name',        header: '품목',        width: '*',  align: 'left', minWidth: 120 },
                        { binding: 'request_qty_sum', header: '로트투입량',  width: 100, format: 'n2', align: 'right' },
                        { binding: 'bom_consumed',    header: '소요량(BOM)', width: 110, format: 'n2', align: 'right' },
                        { binding: 'remain_input_qty',header: '잔여량',      width: 90,  format: 'n2', align: 'right' },
                        { binding: 'mc_qty',          header: '실생산소모량', width: 110, format: 'n2', align: 'right' },
                        { binding: 'currentStock',    header: '현재재고',    width: 90,  format: 'n2', align: 'right' },
                        { binding: 'unit',            header: '단위',        width: 60,  align: 'center' },
                    ],
                    itemFormatter: (panel, row, col, cell) => {
                        if (panel.cellType === wijmo.grid.CellType.Cell) {
                            const item = panel.rows[row].dataItem;
                            if (item && item.useyn === 'Y') cell.style.backgroundColor = '#f8d2cb';
                        }
                    }
                });
            }

            initInputLotGrid() {
                this.inputLotGrid = new wijmo.grid.FlexGrid('#input-lot-grid', {
                    autoGenerateColumns: false,
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    isReadOnly: false,
                    columns: [
                        { binding: 'lot_number', header: '로트번호', width: 140, align: 'center' },
                        { binding: 'mat_code',   header: '품목코드', width: 120, align: 'center' },
                        { binding: 'mat_name',   header: '품목명',   width: '*',  align: 'left' },
                        { binding: 'input_qty',  header: '투입량',   width: 90,  format: 'n2', align: 'right' },
                    ]
                });
            }

            // ════════ 검사 탭 (lot 연결 · 템플릿 구동) ════════
            // ※ INSP_TEMPLATES는 지금은 내장. 추후 insp_template/_item 테이블에서 AJAX 로드로 교체.
            initInspectTab() {
                const _this = this;
                this.INSP_TEMPLATES = {
                    'BASKET-50': { name:'#60 BASKET TEST 50회', type:'repeat', count:50,
                        item:'BASKET LOCK ON/OFF', criteria:['BSC 30-30주','BSC 60-60주','BMSC-60주'], tool:true },
                    'ROTOR': { name:'#50 ROTOR', type:'checklist', items:[
                            {no:1,item:'전원 ON/OFF (3회)',criteria:'ON·OFF / 전원 LED·스위치 문제 없을 것',method:'육안'},
                            {no:2,item:'외관 및 손잡이 고정',criteria:'파손·이물질·얼룩 없을 것 / 손잡이 헛돎 없이 고정',method:'육안'},
                            {no:3,item:'배터리 충전',criteria:'충전 LED 점등·점멸 및 100% 충전',method:'육안'},
                            {no:4,item:'블루투스',criteria:'연결 멘트 및 모니터에 ROTOR 배터리 잔량 표시',method:'육안'},
                            {no:5,item:'BASKET',criteria:'움직임 부드럽고 소음 없을 것 / 챔버·모터 쏠림 없을 것',method:'육안'},
                            {no:6,item:'ROTOR 진동 밸런스',criteria:'ROTOR 진동 및 소음 없을 것',method:'육안 / EAR'},
                        ]},
                };
                this.inspRows = [];
                $('#inspTplSel').html(Object.entries(this.INSP_TEMPLATES).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join(''));
                $('#inspDate').val(new Date().toISOString().slice(0,10));
                $('#inspWorker').val(typeof username !== 'undefined' && username ? username : (typeof userid!=='undefined'?userid:''));
                $('#inspTplSel').on('change', () => _this.renderInspectTemplate());
                $('.tab-links a[name="tabInspect"]').on('click', () => _this.refreshInspectHead());
                $('#btnInspSave').on('click', () => _this.saveInspect());
                this.renderInspectTemplate();
            }

            refreshInspectHead() {
                const t = ((($('#mat_code').val()||'') + ' ' + ($('#mat_name').val()||'')).trim());
                $('#inspProd').text(t || '작업을 선택하세요');
            }

            renderInspectTemplate() {
                const tpl = this.INSP_TEMPLATES[$('#inspTplSel').val()];
                this.refreshInspectHead();
                if (tpl.type === 'repeat') this.renderInspRepeat(tpl);
                else this.renderInspChecklist(tpl);
            }

            // 반복형(BASKET 50회): 1회차 완료 → 다음 회차 생성 (증분). 직전 값 이월.
            renderInspRepeat(tpl) {
                const _this=this;
                this.inspRounds = [];          // 완료된 회차
                this.inspTotal  = tpl.count;   // 50
                const crit = tpl.criteria.map(c=>`<option>${c}</option>`).join('');
                $('#inspTplArea').html(`
                  <div class="insp-box">
                    <div class="insp-secttitle">${tpl.name} — ${tpl.item}</div>
                    <div class="insp-toolbar">
                      <label class="hf">합격기준<select id="inspCrit">${crit}</select></label>
                      <div class="insp-progress">진행 <b id="inspDone">0</b> / ${tpl.count}
                        &nbsp;·&nbsp; <span class="pass">합격 <b id="inspCp">0</b></span>
                        &nbsp; <span class="fail">불합격 <b id="inspCf">0</b></span></div>
                    </div>
                    <table class="work-table">
                      <thead><tr><th style="width:60px;">회차</th><th style="width:100px;">결과</th><th style="width:100px;">측정값</th><th>사유</th>${tpl.tool?'<th style="width:130px;">사용공구</th>':''}<th style="width:110px;">검사자</th><th style="width:60px;"></th></tr></thead>
                      <tbody id="inspDoneBody"></tbody>
                    </table>
                    <div id="inspActiveCard" class="insp-active"></div>
                  </div>`);
                $('#inspCrit').on('change', ()=>_this.inspRounds.forEach(r=>r.criteria=$('#inspCrit').val()));
                this.drawInspActive(tpl);
                this.drawInspDone(tpl);
            }

            // 현재 회차 입력 카드 (직전 회차 값 이월: 측정값/사용공구/검사자)
            drawInspActive(tpl) {
                const _this=this;
                const done = this.inspRounds.length;
                if (done >= this.inspTotal) {
                    $('#inspActiveCard').html(`<div class="insp-complete">✓ ${this.inspTotal}회 전수검사 완료 — 저장하세요.</div>`);
                    return;
                }
                const prev = this.inspRounds[done-1] || {};
                const card = { no: done+1, value: prev.value || 'OK', tool: prev.tool || '',
                    inspector: prev.inspector || $('#inspWorker').val() };
                this._activeCard = card;
                $('#inspActiveCard').html(`
                  <div class="ac-title">현재 회차 <b>${card.no}</b> / ${this.inspTotal}</div>
                  <div class="ac-fields">
                    <label class="hf">측정값<input type="text" id="acValue" value="${card.value}"></label>
                    ${tpl.tool?`<label class="hf">사용공구<input type="text" id="acTool" value="${card.tool}" placeholder="관리번호"></label>`:''}
                    <label class="hf">검사자<input type="text" id="acInspector" value="${card.inspector}"></label>
                    <label class="hf" style="flex:1 1 240px;">사유 (불합격 시)<input type="text" id="acReason" placeholder="불합격일 때 입력"></label>
                  </div>
                  <div class="ac-btns">
                    <button type="button" class="res-btn pass big" id="acPass">합격 (PASS)</button>
                    <button type="button" class="res-btn fail big" id="acFail">불합격 (FAIL)</button>
                  </div>`);
                const commit = (result) => {
                    const c = _this._activeCard;
                    c.value = $('#acValue').val();
                    c.tool = $('#acTool').length ? $('#acTool').val() : '';
                    c.inspector = $('#acInspector').val();
                    c.reason = $('#acReason').val();
                    c.result = result;
                    c.criteria = $('#inspCrit').val();
                    _this.inspRounds.push(c);
                    _this.drawInspDone(tpl);
                    _this.drawInspActive(tpl);
                    document.getElementById('inspActiveCard')?.scrollIntoView({ block:'center', behavior:'smooth' });
                };
                $('#acPass').on('click', ()=>commit('PASS'));
                $('#acFail').on('click', ()=>{ if(!$('#acReason').val()){ alert('불합격 사유를 입력하세요.'); $('#acReason').focus(); return; } commit('FAIL'); });
            }

            // 완료 회차 목록 (취소 가능)
            drawInspDone(tpl) {
                const _this=this;
                $('#inspDoneBody').html(this.inspRounds.map((r,i)=>`
                  <tr class="${r.result==='FAIL'?'failrow':''}">
                    <td>${r.no}</td>
                    <td><span class="res-tag ${r.result==='PASS'?'pass':'fail'}">${r.result}</span></td>
                    <td>${r.value||''}</td><td style="text-align:left;">${r.reason||''}</td>
                    ${tpl.tool?`<td>${r.tool||''}</td>`:''}<td>${r.inspector||''}</td>
                    <td><button type="button" class="btn-mini" data-i="${i}">취소</button></td>
                  </tr>`).join(''));
                $('#inspDoneBody .btn-mini').off('click').on('click',function(){
                    const i=+$(this).data('i'); _this.inspRounds.splice(i,1);
                    _this.inspRounds.forEach((r,k)=>r.no=k+1);
                    _this.drawInspDone(tpl); _this.drawInspActive(tpl);
                });
                const p=this.inspRounds.filter(r=>r.result==='PASS').length;
                $('#inspDone').text(this.inspRounds.length);
                $('#inspCp').text(p); $('#inspCf').text(this.inspRounds.length-p);
            }

            // 항목형(ROTOR): 고정 항목 PASS/FAIL
            renderInspChecklist(tpl) {
                this.inspRows = tpl.items.map(it=>({no:it.no,item:it.item,result:'PASS',value:''}));
                $('#inspTplArea').html(`
                  <div class="insp-box">
                    <div class="insp-secttitle">${tpl.name} — 항목별 검사</div>
                    <div class="insp-scroll">
                      <table class="work-table">
                        <thead><tr><th style="width:54px;">No</th><th style="width:170px;">검사항목</th><th>합격기준</th><th style="width:90px;">판정</th><th style="width:130px;">결과</th><th style="width:140px;">측정값/비고</th></tr></thead>
                        <tbody>${tpl.items.map((it,i)=>`<tr id="inspCk${i}"><td>${it.no}</td><td style="text-align:left;">${it.item}</td><td style="text-align:left;" class="muted">${it.criteria}</td><td>${it.method}</td><td><button type="button" class="res-btn pass" data-i="${i}">PASS</button></td><td><input type="text" data-i="${i}" style="width:120px;"></td></tr>`).join('')}</tbody>
                      </table>
                    </div>
                  </div>`);
                const _this=this;
                $('#inspTplArea .res-btn').on('click',function(){const i=+$(this).data('i');const r=_this.inspRows[i];r.result=r.result==='PASS'?'FAIL':'PASS';$(this).text(r.result).attr('class','res-btn '+(r.result==='PASS'?'pass':'fail'));$('#inspCk'+i).css('background',r.result==='FAIL'?'#fff5f5':'');});
                $('#inspTplArea input').on('change',function(){_this.inspRows[+$(this).data('i')].value=this.value;});
            }

            buildInspPayload() {
                const tpl = this.INSP_TEMPLATES[$('#inspTplSel').val()];
                const rows = tpl.type === 'repeat' ? (this.inspRounds||[]) : (this.inspRows||[]);
                const pass = rows.filter(r=>r.result==='PASS').length;
                return { template_code:$('#inspTplSel').val(), lot_number:$('#inspLot').val(),
                    job_res_id:this.jobres?.id||null, mat_code:$('#mat_code').val()||null,
                    inspector:$('#inspWorker').val(), insp_date:$('#inspDate').val(),
                    criteria:$('#inspCrit').val()||null, total_qty:rows.length,
                    pass_qty:pass, fail_qty:rows.length-pass,
                    judge:(rows.length-pass)===0?'합격':'불합격', details:rows };
            }

            saveInspect() {
                const p=this.buildInspPayload();
                if(!p.lot_number){ alert('대상 LOT을 스캔/입력하세요.'); return; }
                // 실제 저장: insp_result(헤더) + insp_result_detail(항목) INSERT
                AjaxUtil.postAsyncData(this.baseUrl + '/insp_save',
                    { payload: JSON.stringify(p), spjangcd: this.spjangcd || '' },
                    () => { $('#inspSaveHint').text(`저장 완료: ${p.judge} (합격 ${p.pass_qty}/${p.total_qty})`); });
            }

        }  // end class ProcInspectPage

        $(document).ready(function () {
            window.page = new ProcInspectPage(PROCESS_CODE);
        });
    </script>

</th:block>
</html>
