<html layout:decorate="~{layout_page}">

<head>
    <style>
        .greenText span {
            color: #66DA26;
        }

        .redText span {
            color: #FF0000;
        }

        .grayText span {
            color: #8C8C8C;
        }

        .blueText span {
            color: #4374D9;
        }

        .yellowText span {
            color: #FFE400;
        }

        [data-ax5grid] [data-ax5grid-container="root"] [data-ax5grid-container="body"] [data-ax5grid-panel] table tr td [data-ax5grid-cellHolder] {
            font-size: 14px;
        }
        .card-text{
            margin-bottom: 10px;
        }

        .wj-flexgrid,
        canvas.wj-flexgrid {
            flex: 1 1 auto;
            min-height: 0;
            background-color: #f8f8f8;
        }

        .chart-wrapper {
            flex: 2;
            min-width: 0;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; /* 혹시 몰라서 */
        }
    </style>
</head>
<th:block layout:fragment="content">
    <div class="layout-contents">
        <div class="page-title-wrap">
            <div class="left">
                <h2>생산 진행 현황</h2>
                <a title="북마크" class="bookmark toggle">내 메뉴</a>
            </div>
            <ul class="page-navi">
                <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>
                <li>대시보드</li>
                <li>생산 진행 현황</li>
            </ul>
        </div>

        <div class="tab-wrap">
            <div class="tab-contents" style="display: flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; gap: 10px; flex: 1; min-height: 0;">
                    <section class="section" style="flex: 1;">
                        <div class="section-top" style="justify-content: left; gap: 15px;">
                            <div class="search-wrap">
                                <dl>
                                    <dt>
                                        생산일<span class="eq">*</span>
                                    </dt>
                                    <dd>
                                        <ul class="date-box">
                                            <li>
                                                <input type="date" id="date_from" name="date_from">
                                                <label for="date_from" class="hide">시작일</label>
                                            </li>
                                            <li>
                                                <input type="date" id="date_to" name="date_to">
                                                <label for="date_to" class="hide">종료일</label>
                                            </li>
                                        </ul>
                                    </dd>
                                </dl>
                                <dl id="searchComArea">
                                    <dt>
                                        판매처
                                    </dt>
                                    <dd>
                                        <input type="text" id="CompanySearch" name="CompanySearch" placeholder="판매처">
                                    </dd>
                                </dl>

                            </div>
                            <div class="search-wrap">
                                <dl>
                                    <dd>
                                        <div class="srch-box">
                                            <input type="checkbox" id="chxCompYn" name="chxCompYn" checked/>
                                            생산완료 포함
                                        </div>
                                    </dd>
                                </dl>

                                <dl>

                                    <dd>
                                        <li>
                                            <a class="btn btn-search" title="검색" id="btnMainSearch">
                                                <!--                                        class 쓰이는 곳 찾고 없으면 클래스명 수정하기-->
                                                <img th:src="@{/images/icon/btn-srch.svg}" alt="검색 아이콘">
                                                검색
                                            </a>
                                        </li>
                                    </dd>
                                </dl>
                            </div>

                        </div>

                        <div class="container-fluid">
                            <div id="prod-result-grid"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

</th:block>
<th:block layout:fragment="scripts">
    <script th:src="@{/resource/apexcharts/apexcharts.3.26.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript">
        class DashboardPage {
            constructor() {
                this.uri = '/api/dashboard';

                this.grid = null;
                this.viewData = null;   // 그리드의 CollectionView 보관

                this.init();
            }

            init() {
                this.initGrids();
            }

            initGrids() {
                this.grid = new wijmo.grid.FlexGrid('#prod-result-grid', {
                    autoGenerateColumns: false,
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    headersVisibility: wijmo.grid.HeadersVisibility.Column,
                    formatItem: (sender, e) => {
                        if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
                            e.cell.style.textAlign = 'center';
                        }
                    },
                    isReadOnly: true,
                    showMarquee: true,
                    columns: [
                        {binding: 'order_num', header: '작지번호', width: 128, align: 'center', visible: false},
                        {binding: 'company_name', header: '판매처', width: 150, align: 'left', isReadOnly: true},
                        {binding: 'prod_date', header: '생산일', width: 100, align: 'center'},
                        {binding: 'job_state', header: '작업상태', width: 70, align: 'center'},
                        {binding: 'ShipmentStateName', header: '출하상태', width: 100, align: 'center'},
                        {binding: 'mat_name', header: '품목', width: 230, align: 'left'},
                        {binding: 'unit', header: '단위', width: 80, align: 'center'},
                        {binding: 'standard', header: '규격', width: 60, align: 'center'},
                        {binding: 'due_date', header: '납기예정일', width: 100, align: 'center'},
                        {binding: 'order_qty', header: '지시량', width: 80, format: 'n2', align: 'right'},
                        {binding: 'good_qty', header: '양품량', width: 80, format: 'n2', align: 'right'},
                        {binding: 'defect_qty', header: '부적합량', width: 80, format: 'n2', align: 'right'},
                        {binding: 'memo', header: '비고', width: '*', align: 'left'},
                        {binding: 'routing_id', visible: false}
                    ],
                    // 🔹 그리드 데이터는 CollectionView 하나만 사용
                    itemsSource: new wijmo.collections.CollectionView([]),
                    itemFormatter: function (panel, row, col, cell) {
                        if (panel.cellType === wijmo.grid.CellType.Cell) {
                            let column = panel.columns[col];
                            let item = panel.rows[row].dataItem;

                            cell.style.backgroundColor = '';
                            cell.style.color = '';
                            cell.style.borderBottom = '';

                            if (!item) return;

                            // 상태 값에 따라 스타일 적용
                            if (column.binding === 'job_state') {
                                if (item.state === 'working') {
                                    cell.style.backgroundColor = '#00ff21';
                                    cell.style.color = '#000';
                                } else if (item.state === 'finished') {
                                    cell.style.backgroundColor = '#0026ff';
                                    cell.style.color = '#FFFFFF';
                                    cell.style.borderBottom = '1px solid #FFFFFF';
                                } else if (item.state === 'stopped') {
                                    cell.style.backgroundColor = '#f8d2cb';
                                    cell.style.color = '#000';
                                }
                            }
                            if (column.binding === 'order_qty') {
                                cell.style.backgroundColor = '#00ff21';
                            }
                            if (column.binding === 'good_qty') {
                                cell.style.backgroundColor = '#dcf0f8';
                            }
                            if (column.binding === 'defect_qty') {
                                cell.style.backgroundColor = '#f8d2cb';
                            }
                        }
                    }
                });

                // 🔹 이후 searchMainData 에서 이걸 통해 데이터를 갈아끼움
                this.viewData = this.grid.itemsSource;
            }
            // 작업목록 조회
            searchMainData() {
                const _this = this;

                let param = {
                    'date_from': $('#date_from').val(),
                    'date_to': $('#date_to').val(),
                    'choMat': $('#choMat').val(),
                    'factory': $('#Factory_id').val(),
                    'company' : $('#CompanySearch').val(),
                    'is_include_comp': $('#chxCompYn').is(':checked')
                };

                const url = this.uri + '/job_state_read';

                const fnsuccess = function (result) {
                    if (result && Array.isArray(result.data)) {
                        _this.viewData.sourceCollection = result.data;

                        if (window.selectedGridId) {
                            GridUtil.selectRowById(_this.grid, window.selectedGridId);
                            window.selectedGridId = null;
                        }
                    } else {
                        _this.viewData.sourceCollection = [];
                    }
                };

                AjaxUtil.getAsyncData(url, param, fnsuccess);
            }

        }

            let page = null;

        $(document).ready(function (e) {
            page = new DashboardPage();

            const now = new Date();

            // ✅ 시작일: 오늘 기준 1년 전
            const oneYearAgo = new Date(now);
            oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);

            // ✅ 종료일: 오늘 기준 한 달 뒤 (같은 일자)
            const oneMonthLater = new Date(now);
            oneMonthLater.setMonth(oneMonthLater.getMonth() + 1);

            $('#date_from').val(CommonUtil.formatYYYYMMDD(oneYearAgo));
            $('#date_to').val(CommonUtil.formatYYYYMMDD(oneMonthLater));

            page.searchMainData();

            $('#btnMainSearch').click(function (e) {
                page.searchMainData();
            });

        });
    </script>
</th:block>
</html>
